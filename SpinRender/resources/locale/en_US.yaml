# SpinRender Localization — English (US)
# Maps content (labels, icons) to component identifiers.

locale:
  en_US:
    # ─────────────────────────────────────────────────────────────
    # APP HEADER
    # ─────────────────────────────────────────────────────────────
    component.main.header:
      title: "SPINRENDER"
      subtitle: "0.9.0-alpha"
      logo_id: "res/logo.svg"

    # ─────────────────────────────────────────────────────────────
    # VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "WIREFRAME"
        shaded: "SHADED"
        both: "BOTH"

    # ─────────────────────────────────────────────────────────────
    # DIALOG TITLES
    # ─────────────────────────────────────────────────────────────
    dialog:
      advanced:
        title: "Advanced options"
        overrides_placeholder: "e.g. --color-theme=theme"
      save_preset:
        title: "Save preset"
      recall_preset:
        title: "Select custom preset"

    # ─────────────────────────────────────────────────────────────
    # PRESET CARDS
    # ─────────────────────────────────────────────────────────────
    component.preset_card:
      card1:
        label: "HERO"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "SPIN"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "FLIP"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "SELECT CUSTOM"
        icon_ref: "glyphs.preset-custom"

    # ─────────────────────────────────────────────────────────────
    # SECTION HEADERS
    # ─────────────────────────────────────────────────────────────
    sections:
      presets: "Loop preset"
      parameters: "Parameters"
      output: "Output settings"

    # ─────────────────────────────────────────────────────────────
    # PARAMETERS (SLIDERS & INPUTS)
    # ─────────────────────────────────────────────────────────────
    parameters:
      rotation_heading: "Rotation settings"
      rotation_desc: "Board: orient on spindle | Spin: orient the spindle itself"
      lighting_hint: "Select workspace to use KiCad 3D viewer settings"
      system_logging: "System logging"
      log_info: "Logs are kept for 30 days. Useful for troubleshooting render failures."
      open_logs: "OPEN LOGS FOLDER"
      
      board_tilt:
        label: "BOARD TILT"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "BOARD ROLL"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "SPIN TILT"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "SPIN HEADING"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Rotation period"
        desc: "Speed of 360° spin"
        unit: "sec"
      direction:
        label: "Direction"
        options:
          cw:  { label: "CW",  icon_ref: "glyphs.cw" }
          ccw: { label: "CCW", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Lighting"
        options:
          studio:    { label: "STUDIO",    icon_ref: "glyphs.sun" }
          dramatic:  { label: "DRAMATIC",  icon_ref: "glyphs.bolt" }
          soft:      { label: "SOFT",      icon_ref: "glyphs.cloud" }
          workspace: { label: "WORKSPACE", icon_ref: "glyphs.edit" }

    # ─────────────────────────────────────────────────────────────
    # OUTPUT SETTINGS
    # ─────────────────────────────────────────────────────────────
    output:
      auto_desc: "Automatically save to time-stamped directories."
      format:
        label: "Format"
        options: ["MP4 (H.264)", "GIF", "PNG Sequence"]
      resolution:
        label: "Resolution"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Square)"]
      bg_color:
        label: "Background color"

    # ─────────────────────────────────────────────────────────────
    # BUTTONS
    # ─────────────────────────────────────────────────────────────
    component.button:
      render:
        label: "RENDER"
        icon_ref: "glyphs.render-action"
      stop:
        label: "STOP"
        icon_ref: "glyphs.stop"
      cancel:
        label: "CANCEL"
        icon_ref: "glyphs.close"
      ok:
        label: "OK"
        icon_ref: "glyphs.save"
      save:
        label: "SAVE"
        icon_ref: "glyphs.save"
      overwrite:
        label: "OVERWRITE"
        icon_ref: "glyphs.alert"
      close:
        label: "CLOSE"
        icon_ref: "glyphs.close"
      closepreview:
        label: "CLOSE PREVIEW"
        icon_ref: None #"glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      save_preset:
        label: "+ PRESET"
        icon_ref: None #"glyphs.plus"
      browse:
        label: "BROWSE"
        icon_ref: "glyphs.folder"
      exit:
        label: "EXIT"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # ─────────────────────────────────────────────────────────────
    # STATUS MESSAGES
    # ─────────────────────────────────────────────────────────────
    component.status:
      ready: "Ready"
      rendering: "Rendering frame {current}/{total}"
      complete: "Render complete"
      stopped: "Render stopped"
      stopping: "Stopping render..."
      error: "Error: {message}"
      no_presets: "No saved presets found."

    dialog.filename:
      helper: "Frames are saved as name_00001.png, name_00002.png, …"
