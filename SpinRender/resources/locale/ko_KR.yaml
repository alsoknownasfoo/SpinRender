          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "출력 폴더 선택"
      select_output_directory: "출력 디렉토리 선택"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "루프 프리셋"
      parameters: "파라미터"
      output: "출력 설정"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "외형"
      rotation_heading: "회전 설정"
      rotation_desc: "보드: 축 기준 정렬 | 회전: 회전축 자체 정렬"
      lighting_hint: "KiCad 3D 뷰어 설정을 사용하려면 워크스페이스 선택"
      system_logging: "시스템 로그"
      log_info: "로그는 30일간 보관됩니다. 오류 해결에 유용합니다."
      open_logs: "로그 폴더 열기"
      output_path:
        label: "출력 경로"

      board_tilt:
        label: "보드 기울기"
        desc: "카메라 대비 보드 경사"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "보드 회전"
        desc: "중심 기준 보드 회전"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "회전 기울기"
        desc: "전체 회전축 경사"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "회전 방향"
        desc: "보드 주변 카메라 회전"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "회전 주기"
        desc: "360도 회전 소요 시간"
        unit: "초"
      direction:
        label: "방향"
        desc: "회전 방향 (시계 또는 반시계)"
        options:
          cw:  { label: "시계", icon_ref: "glyphs.cw" }
          ccw: { label: "반시계", icon_ref: "glyphs.ccw" }
      lighting:
        label: "조명"
        desc: "사전 정의된 조명 환경"
        options:
          studio:    { label: "스튜디오", icon_ref: "glyphs.sun" }
          dramatic:  { label: "드라마틱", icon_ref: "glyphs.bolt" }
          soft:      { label: "소프트", icon_ref: "glyphs.cloud" }
          workspace: { label: "워크스페이스", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "타임스탬프 폴더에 자동 저장."
      board_options:
        label: "렌더링 옵션"
      format:
        label: "포맷"
        desc: "동영상 또는 이미지 시퀀스"
        options: ["MP4 (H.264)", "GIF", "PNG 시퀀스"]
      hide_vias:
        label: "비아(VIAS)"
      hide_components:
        label: "부품(COMPONENTS)"
      hide_test_points:
        label: "테스트 포인트(T# REFS)"
      resolution:
        label: "해상도"
        desc: "출력 크기 및 종횡비"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (정사각형)"]
        custom_label: "사용자 정의 ({w}×{h})"
      bg_color:
        label: "배경색"
        desc: "투명 영역의 배경색"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "와이어프레임"
        shaded: "셰이딩"
        both: "둘 다"

    # ─────────────────────────────────────────────────────────────
