      resolution:
        label: "해상도"
        desc: "출력 크기 및 가로세로비"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (정사각형)"]
      bg_color:
        label: "배경 색상"
        desc: "투명 영역 배경색"

