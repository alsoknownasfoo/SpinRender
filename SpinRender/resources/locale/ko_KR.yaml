    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "선택"
      button:
        default:
          label: "버튼"
      preset_card:
        default:
          label: "프리셋"
      section:
        default:
          label: "섹션"
      badge:
        label: "프로젝트 폴더"
