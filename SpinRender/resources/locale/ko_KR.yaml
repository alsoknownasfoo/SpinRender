# SpinRender Localization — Korean (KR)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  ko_KR:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "히어로"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "회전"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "플립"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "커스텀 선택"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "렌더링"
        icon_ref: "glyphs.render-action"
      stop:
        label: "중지"
        icon_ref: "glyphs.stop"
      cancel:
        label: "취소"
        icon_ref: "glyphs.close"
      ok:
        label: "확인"
        icon_ref: "glyphs.save"
      save:
        label: "저장"
        icon_ref: "glyphs.save"
      overwrite:
        label: "덮어쓰기"
        icon_ref: "glyphs.alert"
      close:
        label: "닫기"
        icon_ref: "glyphs.close"
      closepreview:
        label: "미리보기 닫기"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "프리셋"
        icon_ref: "glyphs.plus"
      browse:
        label: "찾아보기"
        icon_ref: "glyphs.folder"
      exit:
        label: "종료"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "준비 완료"
      rendering: "{current}/{total} 프레임 렌더링 중"
      complete: "렌더링 완료"
      stopped: "렌더링 중지됨"
      stopping: "중지 중..."
      error: "오류: {message}"
      no_presets: "저장된 프리셋이 없습니다."
      preparing: "렌더링 준비 중..."

    # BADGES
    component.badge:
      label: "프로젝트 폴더"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "고급 옵션"
        header: "고급 옵션"
        theme_desc: "인터페이스 테마."
        overrides_placeholder: "예: --color-theme=theme"
        parameter_overrides_label: "파라미터 덮어쓰기"
        see: " "
        docs_link: "kicad-cli 렌더링 옵션"
        section_output: "출력 경로"
        section_overrides: "파라미터 덮어쓰기"
        section_logging: "시스템 로그"
      save_preset:
        title: "프리셋 저장"
        header: "프리셋 저장"
        placeholder: "프리셋_이름"
      recall_preset:
        title: "커스텀 프리셋 선택"
        header: "커스텀 프리셋 선택"
      filename:
        title: "기본 파일명 입력"
        header: "기본 파일명 입력"
        helper: "프레임은 name_00001.png, name_00002.png, … 형식으로 저장됩니다."
      add_resolution:
        title: "해상도 추가"
        header: "해상도 추가"
        width_label: "가로"
        height_label: "세로"
        helper: "출력 크기를 픽셀 단위로 입력하세요(숫자만 가능)."
        add_button: "추가"
      custom_res:
        title: "사용자 정의 해상도"
        header: "사용자 정의 해상도"
        add_button: "해상도 추가"
        empty: "저장된 사용자 정의 해상도가 없습니다."
      render_error: "렌더링 오류"
      preparing: "준비 중..."
      # 보드가 디스크에 저장되지 않았을 때 표시되는 저장 경고.
      save_required:
        title: "오류"
        message: "SpinRender를 실행하기 전에 이 문서를 저장해야 합니다."
      # 3D 모델 캐시 웜업 (메인 창 전에 표시).
      warmup:
        title: "SpinRender 시작 중"
        message: "렌더링을 위한 3D 모델 준비 중…"
        more_info: "추가 정보"
        detail: |-
          KiCad는 각 부품의 3D 모델을 처음 사용할 때 테셀레이션하여 결과를 캐시합니다. 이는 KiCad의 자체 3D 뷰어가 생성하는 것과 동일한 3D 모델 캐시입니다.

          부품이 많거나 매우 정교한 모델이 포함된 보드는 준비하는 데 몇 분이 걸릴 수 있습니다. 이 과정은 3D 모델 파일이 변경될 때만 다시 수행됩니다. 그 이후에는 렌더링과 미리보기가 빠르게 작동합니다.
        elapsed: "경과 시간: {mins}분 {secs:02d}초"
        required_title: "SpinRender 시작 중"
        required_message: |-
          3D 모델 캐시를 준비하지 않고는 SpinRender를 시작할 수 없습니다.

          이는 KiCad 자체 3D 뷰어가 생성하는 것과 동일한 3D 모델 데이터이며, 3D 모델이 변경되기 전까지 한 번만 수행하면 됩니다. 프로세스를 완료할 준비가 되면 SpinRender를 다시 실행해 주세요.
      about:
        title: "SpinRender 정보"
        check_updates:           "업데이트 확인"
        check_updates_progress:  "확인 중..."
        check_updates_done:      "최신 상태"
        check_updates_available: "업데이트 가능"
        check_updates_simulated: "(Sim)"
        update_via_pcm:          "PCM을 통해 업데이트"
        update_install:          "업데이트 버전:"
        update_confirm:          "지금 최신 버전을 다운로드하고 설치할까요? 완료 후 KiCad를 재시작해야 합니다."
        update_installing:       "설치 중..."
        update_done:             "업데이트 완료 — KiCad 재시작 필요"
        update_done_body:        "SpinRender가 업데이트되었습니다. 새 버전을 적용하려면 KiCad를 재시작하세요."
        update_failed:           "업데이트 실패"
        update_failed_body:      "자동 업데이트를 수행할 수 없습니다:"
        release_notes_label:     "릴리스 노트"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "제작자"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "지원"
        license_tagline:         "개인용 무료\n응원해 주세요!"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "링크"
        discussions_label:       "질문하기"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "문제 보고"
        readme_label:            "도움말 + 문서"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "라이선스"
        gpl_label:               "GPLv3 라이선스"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
