# SpinRender Localization — Korean (KR)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  ko_KR:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
