      rendering: "{current}/{total} 프레임 렌더링 중"
      complete: "렌더링 완료"
      stopped: "렌더링 중지됨"
      stopping: "중지 중..."
      error: "오류: {message}"
      no_presets: "저장된 프리셋이 없습니다."
      preparing: "렌더링 준비 중..."

