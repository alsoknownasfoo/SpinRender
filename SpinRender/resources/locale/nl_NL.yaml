        unit: "°"
      board_roll:
        label: "Bord rol"
        desc: "Draai het bord rond zijn middelpunt"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "As kanteling"
        desc: "Kantel de gehele draaias"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "As richting"
        desc: "Draai de camera rond het bord"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Draaiperiode"
        desc: "Duur van een volledige 360° draai"
        unit: "sec"
      direction:
        label: "Richting"
        desc: "Draairichting (met de klok mee of tegen de klok in)"
        options:
          cw:  { label: "RM",  icon_ref: "glyphs.cw" }
          ccw: { label: "RL", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Verlichting"
        desc: "Vooraf gedefinieerde lichtomgevingen"
        options:
          studio:    { label: "Studio",    icon_ref: "glyphs.sun" }
          dramatic:  { label: "Dramatisch", icon_ref: "glyphs.bolt" }
          soft:      { label: "Zacht",      icon_ref: "glyphs.cloud" }
          workspace: { label: "Werkruimte", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Automatisch opslaan in gedateerde mappen."
      format:
        label: "Formaat"
        desc: "Video- of afbeeldingsvolgorde"
        options: ["MP4 (H.264)", "GIF", "PNG reeks"]
      resolution:
        label: "Resolutie"
        desc: "Uitvoerafmetingen en beeldverhouding"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Vierkant)"]
      bg_color:
        label: "Achtergrondkleur"
        desc: "Effen kleur voor transparante delen"

