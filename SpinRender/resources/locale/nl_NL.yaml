    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "Uiterlijk"
      rotation_heading: "Draai-instellingen"
      rotation_desc: "Bord: op de as | Draai: de as zelf oriënteren"
