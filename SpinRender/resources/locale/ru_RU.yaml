        desc: "Наклон платы относительно камеры"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Крен платы"
        desc: "Вращение платы вокруг центра"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Наклон оси"
        desc: "Наклон всей оси вращения"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Напр. вращения"
        desc: "Вращение камеры вокруг платы"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Период вращения"
        desc: "Время полного оборота на 360°"
        unit: "сек"
      direction:
        label: "Направление"
        desc: "Направление вращения"
