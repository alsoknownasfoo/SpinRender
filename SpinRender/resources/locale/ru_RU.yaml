          dramatic:  { label: "Драма", icon_ref: "glyphs.bolt" }
          soft:      { label: "Мягкое", icon_ref: "glyphs.cloud" }
          workspace: { label: "Рабочее", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Автосохранение в папки с датой."
      format:
        label: "Формат"
        desc: "Видео или последовательность кадров"
        options: ["MP4 (H.264)", "GIF", "PNG кадры"]
      resolution:
        label: "Разрешение"
        desc: "Размеры и соотношение сторон"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Квадрат)"]
      bg_color:
        label: "Цвет фона"
        desc: "Сплошной цвет для прозрачных зон"

