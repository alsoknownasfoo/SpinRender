        desc: "Obrót płytki wokół własnego centrum"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Nachylenie wrzeciona"
        desc: "Nachylenie całej osi obrotu"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Kierunek obrotu"
        desc: "Obrót kamery wokół płytki"
