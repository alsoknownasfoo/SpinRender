        update_done_body:        "SpinRender został zaktualizowany. Zrestartuj KiCad, aby załadować nową wersję."
        update_failed:           "Aktualizacja nieudana"
        update_failed_body:      "Nie udało się zaktualizować automatycznie:"
        release_notes_label:     "Informacje o wydaniu"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "Autor"
        author_github_label:     "alsoknownasfoo"
