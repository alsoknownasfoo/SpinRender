      custom_res:
        title: "Własne rozdzielczości"
        header: "Własne rozdzielczości"
        add_button: "Dodaj rozdzielczość"
        empty: "Brak własnych rozdzielczości."
      render_error: "Błąd renderowania"
      preparing: "Przygotowywanie..."
      # Ostrzeżenie o zapisie, gdy płytka nie została jeszcze zapisana na dysku.
      save_required:
        title: "Błąd"
        message: "Ten dokument musi zostać zapisany przed uruchomieniem SpinRender."
      # Pokazywane raz na sesję na Linuksie, gdzie SpinRender nie był testowany.
      linux_warning:
        title: "Obsługa Linuksa"
        message: "SpinRender nie był testowany na Linuksie. Jeśli napotkasz problemy, zgłoś je na GitHub — Twoja opinia pomaga poprawiać obsługę dla tej platformy."
      # Rozgrzewanie pamięci podręcznej modeli 3D (pokazywane przed głównym oknem).
      warmup:
        title: "Uruchamianie SpinRender"
        message: "Przygotowywanie modeli 3D do renderowania…"
        more_info: "Więcej informacji"
        detail: |-
          KiCad tesseluje model 3D każdego komponentu przy pierwszym użyciu i zapisuje wynik w pamięci podręcznej – jest to ta sama pamięć podręczna modeli 3D, którą tworzy przeglądarka 3D KiCad.

          Przygotowanie płytek z wieloma lub bardzo szczegółowymi modelami może zająć kilka minut. Dzieje się to ponownie tylko w przypadku zmiany plików modeli 3D; potem renderowanie i podgląd są szybkie.
        elapsed: "Upłynęło: {mins}m {secs:02d}s"
        required_title: "Uruchamianie SpinRender"
        required_message: |-
          SpinRender nie może zostać uruchomiony bez przygotowania pamięci podręcznej modeli 3D.

          Są to te same dane modeli 3D, które tworzy przeglądarka 3D KiCad i operację tę należy wykonać tylko raz – do czasu zmiany modeli 3D. Prosimy o ponowne uruchomienie SpinRender, gdy będziesz gotowy na ukończenie tego procesu.
      about:
        title: "O SpinRender"
        check_updates:           "Sprawdź aktualizacje"
        check_updates_progress:  "Sprawdzanie..."
        check_updates_done:      "Aktualny"
