        license_tagline:         "Darmowy do użytku osobistego\nDoceniasz? Wspomóż!"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "Linki"
        discussions_label:       "Zadaj pytanie"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "Zgłoś problem"
        readme_label:            "Pomoc + dokumentacja"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "Licencja"
