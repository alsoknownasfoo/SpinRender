      card1:
        label: "Heros"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Obrót"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Obracanie"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Wybierz własny"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Renderuj"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Zatrzymaj"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Anuluj"
        icon_ref: "glyphs.close"
      ok:
        label: "Ok"
        icon_ref: "glyphs.save"
      save:
        label: "Zapisz"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Nadpisz"
        icon_ref: "glyphs.alert"
      close:
        label: "Zamknij"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Zamknij podgląd"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Preset"
        icon_ref: "glyphs.plus"
      browse:
        label: "Przeglądaj"
        icon_ref: "glyphs.folder"
      exit:
        label: "Wyjdź"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Gotowy"
      rendering: "Renderowanie klatki {current}/{total}"
      complete: "Renderowanie zakończone"
      stopped: "Renderowanie zatrzymane"
      stopping: "Zatrzymywanie..."
      error: "Błąd: {message}"
      no_presets: "Brak zapisanych presetów."
      preparing: "Przygotowywanie..."

    # BADGES
    component.badge:
      label: "Folder projektu"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "Opcje zaawansowane"
        header: "Opcje zaawansowane"
        theme_desc: "Motyw interfejsu."
        overrides_placeholder: "np. --color-theme=theme"
        parameter_overrides_label: "Nadpisywanie parametrów"
        see: " Zobacz "
        docs_link: "opcje renderowania kicad-cli"
        section_output: "Ścieżka wyjściowa"
        section_overrides: "Nadpisywanie parametrów"
        section_logging: "Logowanie systemowe"
      save_preset:
        title: "Zapisz preset"
        header: "Zapisz preset"
        placeholder: "NAZWA_PRESETU"
      recall_preset:
        title: "Wybierz własny preset"
        header: "Wybierz własny preset"
      filename:
        title: "Nazwa pliku"
        header: "Wprowadź nazwę bazową"
        helper: "Klatki zapisywane jako nazwa_00001.png, nazwa_00002.png, …"
      add_resolution:
        title: "Dodaj rozdzielczość"
        header: "Dodaj rozdzielczość"
        width_label: "S"
        height_label: "W"
        helper: "Wprowadź wymiary wyjściowe w pikselach (tylko cyfry)."
