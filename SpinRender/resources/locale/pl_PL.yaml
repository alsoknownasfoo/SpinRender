    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
