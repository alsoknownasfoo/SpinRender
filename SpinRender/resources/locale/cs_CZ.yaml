      card1:
        label: "Hlavní"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Rotace"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Přetočení"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Vlastní"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Renderovat"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Zastavit"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Zrušit"
        icon_ref: "glyphs.close"
      ok:
        label: "Ok"
        icon_ref: "glyphs.save"
      save:
        label: "Uložit"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Přepsat"
        icon_ref: "glyphs.alert"
      close:
        label: "Zavřít"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Zavřít náhled"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Preset"
        icon_ref: "glyphs.plus"
      browse:
        label: "Procházet"
        icon_ref: "glyphs.folder"
      exit:
        label: "Ukončit"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Připraveno"
      rendering: "Renderování snímku {current}/{total}"
      complete: "Renderování dokončeno"
      stopped: "Renderování zastaveno"
      stopping: "Zastavování..."
      error: "Chyba: {message}"
      no_presets: "Nenalezena žádná uložená nastavení."
      preparing: "Příprava renderování..."

    # BADGES
    component.badge:
      label: "Složka projektu"

