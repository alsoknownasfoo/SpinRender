# SpinRender Localization — Czech (CZ)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  cs_CZ:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
