    # DIALOGS
    dialog:
      advanced:
        title: "Pokročilé"
        header: "Pokročilé volby"
        theme_desc: "Motiv rozhraní."
        overrides_placeholder: "např. --color-theme=theme"
        parameter_overrides_label: "Přebití parametrů"
        see: " Viz "
        docs_link: "kicad-cli volby renderování"
        section_output: "Cesta výstupu"
        section_overrides: "Přebití parametrů"
        section_logging: "Systémový log"
      save_preset:
        title: "Uložit preset"
        header: "Uložit preset"
        placeholder: "NAZEV_PRESETU"
      recall_preset:
        title: "Vybrat vlastní preset"
        header: "Vybrat vlastní preset"
      filename:
        title: "Zadejte základní název souboru"
        header: "Zadejte základní název souboru"
        helper: "Snímky jsou ukládány jako název_00001.png, název_00002.png, …"
      add_resolution:
        title: "Přidat rozlišení"
        header: "Přidat rozlišení"
        width_label: "Š"
        height_label: "V"
        helper: "Zadejte výstupní rozměry v pixelech (pouze čísla)."
        add_button: "Přidat"
      custom_res:
        title: "Vlastní rozlišení"
        header: "Vlastní rozlišení"
        add_button: "Přidat rozlišení"
        empty: "Zatím žádná vlastní rozlišení."
      render_error: "Chyba renderování"
      preparing: "Příprava renderování..."
      # Ochrana uložení, pokud deska nebyla nikdy uložena na disk.
      save_required:
        title: "Chyba"
        message: "Tento dokument musí být před spuštěním SpinRender uložen."
      # Zobrazeno jednou za spuštění na Linuxu, kde je SpinRender netestován.
      linux_warning:
        title: "Podpora Linuxu"
        message: "SpinRender na Linuxu nebyl testován. Pokud narazíte na problémy, hlaste je prosím na GitHub — vaše zpětná vazba pomůže zlepšit podporu pro tuto platformu."
      # Předehřev mezipaměti 3D modelů (zobrazuje se před hlavním oknem).
      warmup:
        title: "Spouštění SpinRender"
        message: "Příprava 3D modelů pro renderování…"
        more_info: "Více informací"
        detail: |-
          KiCad při prvním použití vypočítá 3D model každé součástky a výsledek uloží do mezipaměti – jedná se o stejnou mezipaměť 3D modelů, kterou využívá i vlastní 3D prohlížeč KiCad.

          Desky s mnoha nebo vysoce detailními modely mohou vyžadovat několik minut na přípravu. K tomuto procesu dochází znovu pouze při změně souborů 3D modelů; poté jsou rendery i náhledy rychlé.
        elapsed: "Uplynulo: {mins}m {secs:02d}s"
        required_title: "Spouštění SpinRender"
        required_message: |-
          SpinRender nelze spustit bez přípravy mezipaměti 3D modelů.

          Jedná se o stejná data 3D modelů, která využívá vlastní 3D prohlížeč KiCad, a je třeba je připravit pouze jednou – dokud se nezmění vaše 3D modely. Až budete připraveni nechat proces dokončit, spusťte SpinRender znovu.
      about:
        title: "O SpinRender"
        check_updates:           "Zkontrolovat aktualizace"
        check_updates_progress:  "Kontrola..."
        check_updates_done:      "Aktuální"
