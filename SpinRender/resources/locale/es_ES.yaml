# SpinRender Localization — Spanish (ES)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  es_ES:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      subtitle: "0.9.0-alpha"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "Héroe"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Giro"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Giro vertical"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Pers. sel."
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Renderizar"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Detener"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Cancelar"
        icon_ref: "glyphs.close"
      ok:
        label: "Aceptar"
        icon_ref: "glyphs.save"
      save:
        label: "Guardar"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Sobrescribir"
        icon_ref: "glyphs.alert"
      close:
        label: "Cerrar"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Cerrar vista"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Ajuste"
        icon_ref: "glyphs.plus"
      browse:
        label: "Explorar"
        icon_ref: "glyphs.folder"
      exit:
        label: "Salir"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Listo"
      rendering: "Renderizando fotograma {current}/{total}"
      complete: "Renderizado completo"
      stopped: "Renderizado detenido"
      stopping: "Deteniendo renderizado..."
      error: "Error: {message}"
      no_presets: "No se encontraron ajustes guardados."
      preparing: "Preparando renderizado..."

    # BADGES
    component.badge:
      label: "Carpeta del proyecto"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "Opciones avanzadas"
        header: "Opciones avanzadas"
        theme_desc: "Tema de la interfaz."
        overrides_placeholder: "ej. --color-theme=theme"
        parameter_overrides_label: "Sobrescribir parámetros"
        see: " Ver "
        docs_link: "opciones de kicad-cli render"
        section_output: "Ruta de salida"
        section_overrides: "Sobrescribir parámetros"
        section_logging: "Registro del sistema"
      save_preset:
        title: "Guardar ajuste"
        header: "Guardar ajuste"
        placeholder: "NOMBRE_AJUSTE"
      recall_preset:
        title: "Seleccionar ajuste personalizado"
        header: "Seleccionar ajuste personalizado"
      filename:
        title: "Nombre de archivo base"
        header: "Nombre de archivo base"
        helper: "Fotogramas guardados como nombre_00001.png, nombre_00002.png, …"
      render_error: "Error de renderizado"
      preparing: "Preparando renderizado..."
      about:
        title: "Acerca de SpinRender"
        check_updates:           "Buscar actualizaciones"
        check_updates_progress:  "Buscando..."
        check_updates_done:      "Actualizado"
        check_updates_available: "Act. disponible"
        check_updates_simulated: "(Sim)"
        release_notes_label:     "Notas de versión"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "Autor"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "Soportado por"
        license_tagline:         "Gratis para uso personal
¡Dona si te encanta!"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "Enlaces"
        discussions_label:       "Preguntar algo"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "Informar de un error"
        readme_label:            "Ayuda + documentación"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "Licencia"
        gpl_label:               "Licencia GPLv3"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
        cc_url:                  "https://creativecommons.org/licenses/by-nc/4.0/"
        notices_label:           "Avisos de código abierto"
        notices_url:             "https://github.com/alsoknownasfoo/SpinRender/blob/main/docs/NOTICES.md"
        github_sponsors_url:     "https://github.com/sponsors/alsoknownasfoo"
        kofi_url:                "https://ko-fi.com/alsoknownasfoo"
        ai:
          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "Salida: carpeta"
      select_output_directory: "Salida: directorio"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "Ajustes de bucle"
      parameters: "Parámetros"
      output: "Config. de salida"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "Apariencia"
      rotation_heading: "Config. de rotación"
      rotation_desc: "Placa: orientar en eje | Giro: orientar el eje mismo"
      lighting_hint: "Usa el espacio de trabajo para ajustes de KiCad"
      system_logging: "Registros del sistema"
      log_info: "Los registros se guardan 30 días. Útiles para errores."
      open_logs: "Abrir carpeta de registros"
      output_path:
        label: "Ruta de salida"

      board_tilt:
        label: "Inclinación placa"
        desc: "Inclina la placa respecto a la cámara"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Balanceo placa"
        desc: "Gira la placa sobre su centro"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Inclinación giro"
        desc: "Inclina todo el eje de rotación"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Rumbo de giro"
        desc: "Gira la cámara alrededor de la placa"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Periodo rotación"
        desc: "Duración de un giro completo de 360°"
        unit: "seg"
      direction:
        label: "Dirección"
        desc: "Sentido de rotación (horario o antihorario)"
        options:
          cw:  { label: "SH",  icon_ref: "glyphs.cw" }
          ccw: { label: "SAH", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Iluminación"
        desc: "Entornos de luz predefinidos"
        options:
          studio:    { label: "Estudio",    icon_ref: "glyphs.sun" }
          dramatic:  { label: "Dramático",  icon_ref: "glyphs.bolt" }
          soft:      { label: "Suave",      icon_ref: "glyphs.cloud" }
          workspace: { label: "Espacio",    icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Guardar automáticamente en carpetas con fecha."
      format:
        label: "Formato"
        desc: "Vídeo o secuencia de imágenes"
        options: ["MP4 (H.264)", "GIF", "Secuencia PNG"]
      resolution:
        label: "Resolución"
        desc: "Dimensiones y relación de aspecto"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Cuadrado)"]
      bg_color:
        label: "Color de fondo"
        desc: "Color sólido para áreas transparentes"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "Estructura"
        shaded: "Sombreado"
        both: "Ambos"

    # ─────────────────────────────────────────────────────────────
    # 5. SYSTEM & FALLBACKS
    # ─────────────────────────────────────────────────────────────

    # SYSTEM CONTROLS
    system.controls:
      toggle_off: "Off"
      toggle_on: "On"
      toggle_info: "Info"
      toggle_debug: "Debug"
      dropdown_placeholder: "Seleccionar opción"
      section_default: "Sección"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "Seleccionar"
      button:
        default:
          label: "Botón"
      preset_card:
        default:
          label: "Ajuste"
      section:
        default:
          label: "Sección"
      badge:
        label: "Carpeta del proyecto"
