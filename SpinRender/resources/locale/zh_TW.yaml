          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "選擇輸出資料夾"
      select_output_directory: "選擇輸出目錄"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "循環預設"
      parameters: "參數設置"
      output: "輸出設置"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "外觀"
      rotation_heading: "旋轉設置"
      rotation_desc: "電路板：繞主軸定位 | 旋轉：定位主軸本身"
      lighting_hint: "選擇工作區以使用 KiCad 3D 檢視器設置"
      system_logging: "系統日誌"
      log_info: "日誌保留30天，用於排除渲染故障。"
      open_logs: "開啟日誌資料夾"
      output_path:
        label: "輸出路徑"

      board_tilt:
        label: "電路板傾斜"
        desc: "電路板相對於攝像機的傾斜度"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "電路板滾動"
        desc: "電路板繞中心旋轉"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "旋轉傾斜"
        desc: "傾斜整個旋轉軸"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "旋轉航向"
        desc: "攝像機繞電路板旋轉"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "旋轉週期"
        desc: "完成360°旋轉所需時間"
        unit: "秒"
      direction:
        label: "方向"
        desc: "旋轉方向（順時針或逆時針）"
        options:
          cw:  { label: "順時針", icon_ref: "glyphs.cw" }
          ccw: { label: "逆時針", icon_ref: "glyphs.ccw" }
      lighting:
        label: "燈光"
        desc: "預設光照環境"
        options:
          studio:    { label: "影棚", icon_ref: "glyphs.sun" }
          dramatic:  { label: "戲劇", icon_ref: "glyphs.bolt" }
          soft:      { label: "柔和", icon_ref: "glyphs.cloud" }
          workspace: { label: "工作區", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "自動儲存到帶時間戳記的目錄。"
      format:
        label: "格式"
        desc: "影片或圖像序列格式"
        options: ["MP4 (H.264)", "GIF", "PNG 序列"]
      resolution:
        label: "解析度"
        desc: "輸出尺寸和寬高比"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (方形)"]
      bg_color:
        label: "背景顏色"
        desc: "透明區域填充色"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "線框"
        shaded: "著色"
        both: "兩者"

    # ─────────────────────────────────────────────────────────────
    # 5. SYSTEM & FALLBACKS
    # ─────────────────────────────────────────────────────────────

    # SYSTEM CONTROLS
    system.controls:
      toggle_off: "關閉"
      toggle_on: "開啟"
      toggle_info: "資訊"
      toggle_debug: "除錯"
      dropdown_placeholder: "請選擇選項"
      section_default: "部分"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "選擇選項"
      button:
        default:
          label: "按鈕"
      preset_card:
        default:
          label: "預設"
      section:
        default:
          label: "部分"
      badge:
        label: "專案資料夾"
