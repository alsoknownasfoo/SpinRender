# SpinRender Localization — Chinese Traditional (TW)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  zh_TW:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      subtitle: "0.9.0-alpha"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "展示"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "旋轉"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "翻轉"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "自定義"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "渲染"
        icon_ref: "glyphs.render-action"
      stop:
        label: "停止"
        icon_ref: "glyphs.stop"
      cancel:
        label: "取消"
        icon_ref: "glyphs.close"
      ok:
        label: "確定"
        icon_ref: "glyphs.save"
      save:
        label: "儲存"
        icon_ref: "glyphs.save"
      overwrite:
        label: "覆寫"
        icon_ref: "glyphs.alert"
      close:
        label: "關閉"
        icon_ref: "glyphs.close"
      closepreview:
        label: "關閉預覽"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "預設"
        icon_ref: "glyphs.plus"
      browse:
        label: "瀏覽"
        icon_ref: "glyphs.folder"
      exit:
        label: "退出"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "就緒"
      rendering: "正在渲染第 {current}/{total} 幀"
      complete: "渲染完成"
      stopped: "渲染已停止"
      stopping: "正在停止渲染..."
      error: "錯誤: {message}"
      no_presets: "未找到儲存的預設。"
      preparing: "正在準備渲染..."

    # BADGES
    component.badge:
      label: "專案資料夾"

