    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "外観"
      rotation_heading: "回転設定"
      rotation_desc: "基板: 主軸上で配置 | スピン: 主軸自体を配置"
