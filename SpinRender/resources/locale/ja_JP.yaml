# SpinRender Localization — Japanese (JP)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  ja_JP:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "ヒーロー"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "スピン"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "フリップ"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "カスタム選択"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "レンダリング"
        icon_ref: "glyphs.render-action"
      stop:
        label: "停止"
        icon_ref: "glyphs.stop"
      cancel:
        label: "キャンセル"
        icon_ref: "glyphs.close"
      ok:
        label: "OK"
        icon_ref: "glyphs.save"
      save:
        label: "保存"
        icon_ref: "glyphs.save"
      overwrite:
        label: "上書き"
        icon_ref: "glyphs.alert"
      close:
        label: "閉じる"
        icon_ref: "glyphs.close"
      closepreview:
        label: "プレビューを閉じる"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "プリセット"
        icon_ref: "glyphs.plus"
      browse:
        label: "参照"
        icon_ref: "glyphs.folder"
      exit:
        label: "終了"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "準備完了"
      rendering: "レンダリング中: {current}/{total} フレーム"
      complete: "レンダリング完了"
      stopped: "レンダリング停止"
      stopping: "停止中..."
      error: "エラー: {message}"
      no_presets: "保存されたプリセットはありません。"
      preparing: "レンダリング準備中..."

    # BADGES
    component.badge:
      label: "プロジェクトフォルダ"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "詳細設定"
        header: "詳細設定"
        theme_desc: "インターフェーステーマ。"
        overrides_placeholder: "例: --color-theme=theme"
        parameter_overrides_label: "パラメータ上書き"
        see: " 参照: "
        docs_link: "kicad-cli レンダリングオプション"
        section_output: "出力パス"
        section_overrides: "パラメータ上書き"
        section_logging: "システムログ"
      save_preset:
        title: "プリセット保存"
        header: "プリセット保存"
        placeholder: "プリセット名"
      recall_preset:
        title: "カスタムプリセット選択"
        header: "カスタムプリセット選択"
      filename:
        title: "ベースファイル名を入力"
        header: "ベースファイル名を入力"
        helper: "画像は name_00001.png, name_00002.png, … として保存されます。"
      add_resolution:
        title: "解像度の追加"
        header: "解像度の追加"
        width_label: "幅"
        height_label: "高"
        helper: "出力サイズをピクセル単位で入力してください（数字のみ）。"
        add_button: "追加"
      custom_res:
        title: "カスタム解像度"
        header: "カスタム解像度"
        add_button: "解像度を追加"
        empty: "カスタム解像度はまだありません。"
      render_error: "レンダリングエラー"
      preparing: "準備中..."
      # 基板が一度も保存されていない場合に表示される保存警告。
      save_required:
        title: "エラー"
        message: "SpinRenderを起動する前に、このドキュメントを保存する必要があります。"
      # Linux上で1回のみ起動時に表示されます。SpinRenderはLinuxでテストされていません。
      linux_warning:
        title: "Linux対応"
        message: "SpinRenderはLinuxでテストされていません。問題が発生した場合は、GitHubで報告してください。フィードバックはこのプラットフォーム対応の改善に役立ちます。"
      # 3Dモデルキャッシュの準備（メインウィンドウの前に表示）。
      warmup:
        title: "SpinRenderを起動中"
        message: "レンダリング用の3Dモデルを準備しています…"
        more_info: "詳細情報"
        detail: |-
          KiCadは、各コンポーネントの3Dモデルを最初に使用するときにテッセレーションを行い、その結果をキャッシュします。これはKiCad独自の3Dビューアーが構築するのと同じ3Dモデルキャッシュです。

          モデルが多い場合や詳細なモデルがある基板では、準備に数分かかることがあります。これは3Dモデルファイルが変更された場合にのみ再実行されます。その後、レンダリングとプレビューは高速になります。
        elapsed: "経過時間: {mins}分 {secs:02d}秒"
        required_title: "SpinRenderを起動中"
        required_message: |-
          3Dモデルキャッシュを準備せずにSpinRenderを開始することはできません。

          これはKiCad独自の3Dビューアーが構築するのと同じ3Dモデルデータであり、3Dモデルが変更されるまで一度だけ行う必要があります。準備が整いましたら、SpinRenderを再起動して完了させてください。
      about:
        title: "SpinRender について"
        check_updates:           "アップデートを確認"
        check_updates_progress:  "確認中..."
        check_updates_done:      "最新の状態です"
        check_updates_available: "更新あり"
        check_updates_simulated: "(Sim)"
        update_via_pcm:          "PCM経由で更新"
        update_install:          "以下に更新"
        update_confirm:          "最新バージョンを今すぐダウンロードしてインストールしますか？ その後、KiCadを再起動する必要があります。"
        update_installing:       "インストール中..."
        update_done:             "更新完了 — KiCadを再起動してください"
        update_done_body:        "SpinRenderが更新されました。新バージョンを読み込むためにKiCadを再起動してください。"
        update_failed:           "更新失敗"
        update_failed_body:      "自動更新できませんでした："
        release_notes_label:     "リリースノート"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "作者"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "サポート"
        license_tagline:         "個人利用無料\n気に入ったら寄付を！"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "リンク"
        discussions_label:       "質問する"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "不具合報告"
        readme_label:            "ヘルプとドキュメント"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "ライセンス"
        gpl_label:               "GPLv3 ライセンス"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
        cc_url:                  "https://creativecommons.org/licenses/by-nc/4.0/"
        notices_label:           "オープンソース通知"
        notices_url:             "https://github.com/alsoknownasfoo/SpinRender/blob/main/docs/NOTICES.md"
        github_sponsors_url:     "https://github.com/sponsors/alsoknownasfoo"
        kofi_url:                "https://ko-fi.com/alsoknownasfoo"
        license_label:           "ライセンス"
        license_text:            "オープンソース · 個人利用は無料"
        built_with_label:        "使用ツール"
        resources_label:         "リソース"
        sponsor_btn:             "スポンサー"
        version_prefix: "v"
        author: "alsoknownasfoo"
        author_prefix: "by "
        ai:
          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "出力フォルダ選択"
      select_output_directory: "出力ディレクトリ選択"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "ループプリセット"
      parameters: "パラメータ"
      output: "出力設定"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "外観"
      rotation_heading: "回転設定"
      rotation_desc: "基板: 主軸上で配置 | スピン: 主軸自体を配置"
      lighting_hint: "ワークスペース選択で KiCad 設定を使用"
      system_logging: "システムログ"
      log_info: "ログは30日間保存されます。不具合調査に有効です。"
      open_logs: "ログフォルダを開く"
      output_path:
        label: "出力パス"

      board_tilt:
        label: "基板の傾き"
        desc: "カメラに対する基板の傾斜"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "基板の回転"
        desc: "中心軸での基板の回転"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "スピンの傾き"
        desc: "回転軸全体の傾斜"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "スピン方向"
        desc: "基板周囲のカメラ回転"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "回転周期"
        desc: "360度回転にかかる時間"
        unit: "秒"
      direction:
        label: "方向"
        desc: "回転方向（時計回り/反時計回り）"
        options:
          cw:  { label: "時計回り", icon_ref: "glyphs.cw" }
          ccw: { label: "反時計回り", icon_ref: "glyphs.ccw" }
      lighting:
        label: "ライティング"
        desc: "定義済みの照明環境"
        options:
          studio:    { label: "スタジオ", icon_ref: "glyphs.sun" }
          dramatic:  { label: "ドラマチック", icon_ref: "glyphs.bolt" }
          soft:      { label: "ソフト", icon_ref: "glyphs.cloud" }
          workspace: { label: "ワークスペース", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "タイムスタンプ付きフォルダに自動保存。"
      board_options:
        label: "レンダーオプション"
      format:
        label: "フォーマット"
        desc: "ビデオまたは連番画像"
        options: ["MP4 (H.264)", "GIF", "PNG連番画像"]
      hide_vias:
        label: "ビア"
      hide_components:
        label: "コンポーネント"
      hide_test_points:
        label: "テストポイント (T#)"
      resolution:
        label: "解像度"
        desc: "出力サイズとアスペクト比"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (正方形)"]
        custom_label: "カスタム ({w}×{h})"
      bg_color:
        label: "背景色"
        desc: "透明部分の背景色"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "ワイヤーフレーム"
        shaded: "シェーディング"
        both: "両方"

    # ─────────────────────────────────────────────────────────────
    # 5. SYSTEM & FALLBACKS
    # ─────────────────────────────────────────────────────────────

    # SYSTEM CONTROLS
    system.controls:
      toggle_off: "オフ"
      toggle_on: "オン"
      toggle_info: "情報"
      toggle_debug: "デバッグ"
      dropdown_placeholder: "選択してください"
      section_default: "セクション"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "選択"
      button:
        default:
          label: "ボタン"
      preset_card:
        default:
          label: "プリセット"
      section:
        default:
          label: "セクション"
      badge:
        label: "プロジェクトフォルダ"
