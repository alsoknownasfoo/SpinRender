      open_logs: "ログフォルダを開く"
      output_path:
        label: "出力パス"

      board_tilt:
        label: "基板の傾き"
        desc: "カメラに対する基板の傾斜"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "基板の回転"
        desc: "中心軸での基板の回転"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "スピンの傾き"
        desc: "回転軸全体の傾斜"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "スピン方向"
        desc: "基板周囲のカメラ回転"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "回転周期"
        desc: "360度回転にかかる時間"
        unit: "秒"
      direction:
        label: "方向"
        desc: "回転方向（時計回り/反時計回り）"
        options:
          cw:  { label: "時計回り", icon_ref: "glyphs.cw" }
          ccw: { label: "反時計回り", icon_ref: "glyphs.ccw" }
      lighting:
        label: "ライティング"
        desc: "定義済みの照明環境"
        options:
          studio:    { label: "スタジオ", icon_ref: "glyphs.sun" }
          dramatic:  { label: "ドラマチック", icon_ref: "glyphs.bolt" }
          soft:      { label: "ソフト", icon_ref: "glyphs.cloud" }
          workspace: { label: "ワークスペース", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "タイムスタンプ付きフォルダに自動保存。"
      format:
        label: "フォーマット"
        desc: "ビデオまたは連番画像"
        options: ["MP4 (H.264)", "GIF", "PNG 連番"]
      resolution:
        label: "解像度"
        desc: "出力サイズとアスペクト比"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (正方形)"]
      bg_color:
        label: "背景色"
        desc: "透過領域の塗りつぶし色"

