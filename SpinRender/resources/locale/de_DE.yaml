    system.controls:
      toggle_off: "Aus"
      toggle_on: "An"
      toggle_info: "Info"
      toggle_debug: "Debug"
      dropdown_placeholder: "Option wählen"
      section_default: "Abschnitt"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "Wählen"
      button:
        default:
          label: "Button"
      preset_card:
        default:
          label: "Preset"
      section:
