        desc: "Platine relativ zur Kamera neigen"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Platinenrollen"
        desc: "Platine um das Zentrum drehen"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Spindelneigung"
        desc: "Ganze Spindel neigen"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Spindelrichtung"
        desc: "Kamera um die Platine drehen"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Rotationsdauer"
        desc: "Zeit für eine volle 360°-Drehung"
        unit: "Sek"
      direction:
        label: "Richtung"
        desc: "Rotationsrichtung (Uhrzeigersinn oder dagegen)"
        options:
          cw:  { label: "UZS", icon_ref: "glyphs.cw" }
          ccw: { label: "GUZS", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Beleuchtung"
        desc: "Vordefinierte Licht-Umgebungen"
        options:
          studio:    { label: "Studio",    icon_ref: "glyphs.sun" }
          dramatic:  { label: "Dramatisch", icon_ref: "glyphs.bolt" }
          soft:      { label: "Sanft",      icon_ref: "glyphs.cloud" }
          workspace: { label: "Arbeitsber.", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Autom. Speichern mit Zeitstempel-Ordnern."
      format:
        label: "Format"
        desc: "Video oder Bildsequenz"
        options: ["MP4 (H.264)", "GIF", "PNG-Sequenz"]
      resolution:
        label: "Auflösung"
        desc: "Ausgabemaße und Seitenverhältnis"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Quadrat)"]
      bg_color:
        label: "Hintergrundfarbe"
        desc: "Farbe für transparente Bereiche"

