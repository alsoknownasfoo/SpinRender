# SpinRender Localization — German (DE)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  de_DE:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "Hero"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Drehung"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Kippen"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Indiv. Ausw."
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Rendern"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Stopp"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Abbrechen"
        icon_ref: "glyphs.close"
      ok:
        label: "OK"
        icon_ref: "glyphs.save"
      save:
        label: "Speichern"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Überschreiben"
        icon_ref: "glyphs.alert"
      close:
        label: "Schließen"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Vorschau zu"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Preset"
        icon_ref: "glyphs.plus"
      browse:
        label: "Durchsuchen"
        icon_ref: "glyphs.folder"
      exit:
        label: "Beenden"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Bereit"
      rendering: "Rendere Bild {current}/{total}"
      complete: "Rendering abgeschlossen"
      stopped: "Rendering gestoppt"
      stopping: "Stoppe Rendering..."
      error: "Fehler: {message}"
      no_presets: "Keine Presets gefunden."
      preparing: "Bereite Rendering vor..."

    # BADGES
    component.badge:
      label: "Projektordner"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "Erweitert"
        header: "Erweiterte Optionen"
        theme_desc: "Benutzeroberflächen-Design."
        overrides_placeholder: "z.B. --color-theme=theme"
        parameter_overrides_label: "Parameter überschreiben"
        see: " Siehe "
        docs_link: "kicad-cli Render-Optionen"
        section_output: "Ausgabepfad"
        section_overrides: "Parameter überschreiben"
        section_logging: "Systemprotokoll"
      save_preset:
        title: "Preset speichern"
        header: "Preset speichern"
        placeholder: "PRESET_NAME"
      recall_preset:
        title: "Eigenes Preset wählen"
        header: "Eigenes Preset wählen"
      filename:
        title: "Dateiname (Basis)"
        header: "Dateiname (Basis)"
        helper: "Bilder werden als name_00001.png, name_00002.png, … gespeichert"
      add_resolution:
        title: "Auflösung hinzufügen"
        header: "Auflösung hinzufügen"
        width_label: "B"
        height_label: "H"
        helper: "Geben Sie die Ausgabemaße in Pixeln ein (nur Zahlen)."
        add_button: "Hinzufügen"
      custom_res:
        title: "Eigene Auflösungen"
        header: "Eigene Auflösungen"
        add_button: "Auflösung hinzufügen"
        empty: "Noch keine eigenen Auflösungen."
      render_error: "Rendering-Fehler"
      preparing: "Bereite Rendering vor..."
      # Speicher-Schutz, wenn die Platine noch nie gespeichert wurde.
      save_required:
        title: "Fehler"
        message: "Dieses Dokument muss gespeichert werden, bevor SpinRender gestartet wird."
      # Wird einmal pro Start unter Linux angezeigt, wo SpinRender nicht getestet ist.
      linux_warning:
        title: "Linux-Unterstützung"
        message: "SpinRender wurde unter Linux nicht getestet. Falls Sie auf Probleme stoßen, melden Sie diese bitte auf GitHub — Ihr Feedback hilft, die Unterstützung für diese Plattform zu verbessern."
      # Vorbereiten des 3D-Modell-Caches (wird vor dem Hauptfenster angezeigt).
      warmup:
        title: "SpinRender wird gestartet"
        message: "3D-Modelle werden für das Rendering vorbereitet…"
        more_info: "Mehr Infos"
        detail: |-
          KiCad tesselliert jedes 3D-Modell einer Komponente beim ersten Gebrauch und
          speichert das Ergebnis — derselbe 3D-Modell-Cache, den auch der KiCad-eigene 3D-Viewer nutzt.

          Platinen mit vielen oder sehr detaillierten Modellen können mehrere Minuten zur
          Vorbereitung benötigen. Dies geschieht nur erneut, wenn sich Ihre 3D-Modelldateien ändern;
          danach sind Renders und die Vorschau schnell.
        elapsed: "Dauer: {mins}m {secs:02d}s"
        required_title: "SpinRender wird gestartet"
        required_message: |-
          SpinRender kann nicht starten, ohne den 3D-Modell-Cache vorzubereiten.

          Dies sind dieselben 3D-Modelldaten, die auch der KiCad-eigene 3D-Viewer nutzt. Dies muss nur einmal durchgeführt werden — bis sich Ihre 3D-Modelle ändern. Bitte starten Sie SpinRender neu, wenn Sie bereit sind, den Vorgang abzuschließen.
      about:
        title: "Über SpinRender"
        check_updates:           "Nach Updates suchen"
        check_updates_progress:  "Prüfe..."
        check_updates_done:      "Aktuell"
        check_updates_available: "Update verfügbar"
        check_updates_simulated: "(Sim)"
        update_via_pcm:          "Update über PCM"
        update_install:          "Update auf"
        update_confirm:          "Die neueste Version jetzt herunterladen und installieren? KiCad muss danach neu gestartet werden."
        update_installing:       "Installiere..."
        update_done:             "Aktualisiert — KiCad neu starten"
        update_done_body:        "SpinRender wurde aktualisiert. Starten Sie KiCad neu, um die neue Version zu laden."
        update_failed:           "Update fehlgeschlagen"
        update_failed_body:      "Automatisches Update fehlgeschlagen:"
        release_notes_label:     "Versionshinweise"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "Autor"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "Unterstützt von"
        license_tagline:         "Gratis für Privatgebrauch\nSpenden willkommen!"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "Links"
        discussions_label:       "Frage stellen"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "Fehler melden"
        readme_label:            "Hilfe + Dokumentation"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "Lizenz"
        gpl_label:               "GPLv3 Lizenz"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
        cc_url:                  "https://creativecommons.org/licenses/by-nc/4.0/"
        notices_label:           "Open-Source-Hinweise"
        notices_url:             "https://github.com/alsoknownasfoo/SpinRender/blob/main/docs/NOTICES.md"
        github_sponsors_url:     "https://github.com/sponsors/alsoknownasfoo"
        kofi_url:                "https://ko-fi.com/alsoknownasfoo"
        license_label:           "LIZENZ"
        license_text:            "OPEN SOURCE · KOSTENLOS FÜR PRIVATGEBRAUCH"
        built_with_label:        "ERSTELLT MIT"
        resources_label:         "RESSOURCEN"
        sponsor_btn:             "SPONSERN"
        version_prefix: "v"
        author: "alsoknownasfoo"
        author_prefix: "von "
        ai:
          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "Ausgabeordner wählen"
      select_output_directory: "Ausgabeverzeichnis wählen"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "Loop-Presets"
      parameters: "Parameter"
      output: "Ausgabeeinstellungen"

