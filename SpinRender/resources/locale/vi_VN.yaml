        label: "Độ nghiêng bảng"
        desc: "Nghiêng bảng mạch so với camera"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Độ lật bảng"
        desc: "Xoay bảng mạch quanh tâm"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Nghiêng trục"
        desc: "Nghiêng toàn bộ trục xoay"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
