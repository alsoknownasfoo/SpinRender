          ccw: { label: "Ngược", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Ánh sáng"
        desc: "Môi trường ánh sáng có sẵn"
        options:
          studio:    { label: "Studio",   icon_ref: "glyphs.sun" }
          dramatic:  { label: "Kịch tính", icon_ref: "glyphs.bolt" }
          soft:      { label: "Dịu",      icon_ref: "glyphs.cloud" }
          workspace: { label: "Làm việc", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Tự động lưu vào thư mục có đóng dấu thời gian."
