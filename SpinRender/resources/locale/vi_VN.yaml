# SpinRender Localization — Vietnamese (VN)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  vi_VN:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "Chính"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Xoay"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Lật"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Tùy chọn"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Xuất ảnh"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Dừng"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Hủy"
        icon_ref: "glyphs.close"
      ok:
        label: "Xong"
        icon_ref: "glyphs.save"
      save:
        label: "Lưu"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Ghi đè"
        icon_ref: "glyphs.alert"
      close:
        label: "Đóng"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Đóng xem trước"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Cài đặt"
        icon_ref: "glyphs.plus"
      browse:
        label: "Duyệt"
        icon_ref: "glyphs.folder"
      exit:
        label: "Thoát"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Sẵn sàng"
      rendering: "Đang xuất khung hình {current}/{total}"
      complete: "Xuất ảnh hoàn tất"
      stopped: "Đã dừng xuất ảnh"
      stopping: "Đang dừng..."
      error: "Lỗi: {message}"
      no_presets: "Không tìm thấy cài đặt đã lưu."
      preparing: "Đang chuẩn bị xuất ảnh..."

    # BADGES
    component.badge:
      label: "Thư mục dự án"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "Nâng cao"
        header: "Tùy chọn nâng cao"
        theme_desc: "Giao diện chủ đề."
        overrides_placeholder: "ví dụ: --color-theme=theme"
        parameter_overrides_label: "Ghi đè tham số"
        see: " Xem "
        docs_link: "tùy chọn xuất kicad-cli"
        section_output: "Đường dẫn xuất"
        section_overrides: "Ghi đè tham số"
        section_logging: "Nhật ký hệ thống"
      save_preset:
        title: "Lưu cài đặt"
        header: "Lưu cài đặt sẵn"
        placeholder: "TEN_CAI_DAT"
      recall_preset:
        title: "Chọn cài đặt tùy chỉnh"
        header: "Chọn cài đặt tùy chỉnh"
      filename:
        title: "Tên tệp"
        header: "Nhập tên tệp cơ bản"
        helper: "Các khung hình được lưu dưới dạng ten_00001.png, ten_00002.png, …"
      render_error: "Lỗi xuất ảnh"
      preparing: "Đang chuẩn bị..."
      # Cảnh báo lưu khi bo mạch chưa bao giờ được lưu vào đĩa.
      save_required:
        title: "Lỗi"
        message: "Tài liệu này cần được lưu trước khi khởi chạy SpinRender."
      # Làm nóng bộ nhớ đệm mô hình 3D (hiển thị trước cửa sổ chính).
      warmup:
        title: "Đang khởi chạy SpinRender"
        message: "Chuẩn bị mô hình 3D để render…"
        more_info: "Thêm thông tin"
        detail: |-
          KiCad sẽ chia lưới mô hình 3D của mỗi linh kiện trong lần đầu tiên sử dụng và lưu kết quả vào bộ nhớ đệm — cùng một bộ nhớ đệm mô hình 3D mà Trình xem 3D của KiCad tự xây dựng.

          Các bo mạch có nhiều hoặc mô hình có độ chi tiết cao có thể mất vài phút để chuẩn bị. Quá trình này chỉ lặp lại nếu các tệp mô hình 3D của bạn thay đổi; sau đó, việc render và xem trước sẽ rất nhanh.
        elapsed: "Đã trôi qua: {mins}p {secs:02d}s"
        required_title: "Đang khởi chạy SpinRender"
        required_message: |-
          SpinRender không thể khởi động mà không chuẩn bị bộ nhớ đệm mô hình 3D.

          Đây cùng là dữ liệu mô hình 3D mà Trình xem 3D của KiCad tự xây dựng, và chỉ cần thực hiện một lần — cho đến khi các mô hình 3D của bạn thay đổi. Vui lòng khởi chạy lại SpinRender khi bạn đã sẵn sàng để quá trình hoàn tất.
      about:
        title: "Về SpinRender"
        check_updates:           "Kiểm tra cập nhật"
        check_updates_progress:  "Đang kiểm tra..."
        check_updates_done:      "Đã là mới nhất"
        check_updates_available: "Có bản cập nhật mới"
        check_updates_simulated: "(Sim)"
        release_notes_label:     "Ghi chú phiên bản"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "Tác giả"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "Được hỗ trợ bởi"
        license_tagline:         "Miễn phí cho cá nhân\nỦng hộ nếu bạn thích!"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "Liên kết"
        discussions_label:       "Đặt câu hỏi"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "Báo lỗi"
        readme_label:            "Trợ giúp + tài liệu"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "Giấy phép"
        gpl_label:               "Giấy phép GPLv3"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
        cc_url:                  "https://creativecommons.org/licenses/by-nc/4.0/"
        notices_label:           "Thông báo nguồn mở"
        notices_url:             "https://github.com/alsoknownasfoo/SpinRender/blob/main/docs/NOTICES.md"
        github_sponsors_url:     "https://github.com/sponsors/alsoknownasfoo"
        kofi_url:                "https://ko-fi.com/alsoknownasfoo"
        version_prefix: "v"
        author: "alsoknownasfoo"
        author_prefix: "bởi "
        license_label: "GIẤY PHÉP"
        license_text: "MÃ NGUỒN MỞ · MIỄN PHÍ CHO MỤC ĐÍCH CÁ NHÂN"
        built_with_label: "ĐƯỢC XÂY DỰNG BẰNG"
        resources_label: "TÀI NGUYÊN"
        sponsor_btn: "TÀI TRỢ"
        ai:
          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "Chọn thư mục"
      select_output_directory: "Chọn thư mục xuất"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "Cài đặt vòng lặp"
      parameters: "Tham số"
      output: "Thiết lập đầu ra"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "Giao diện"
      rotation_heading: "Thiết lập xoay"
      rotation_desc: "Bảng mạch: định hướng trục | Xoay: định hướng chính trục đó"
      lighting_hint: "Chọn không gian để dùng thiết lập KiCad 3D"
      system_logging: "Nhật ký hệ thống"
      log_info: "Nhật ký lưu trong 30 ngày. Hữu ích để tìm lỗi xuất ảnh."
      open_logs: "Mở thư mục nhật ký"
      output_path:
        label: "Đường dẫn xuất"

      board_tilt:
        label: "Độ nghiêng bảng"
        desc: "Nghiêng bảng mạch so với camera"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Độ lật bảng"
        desc: "Xoay bảng mạch quanh tâm"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Nghiêng trục"
        desc: "Nghiêng toàn bộ trục xoay"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Hướng xoay"
        desc: "Xoay camera quanh bảng mạch"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Chu kỳ xoay"
        desc: "Thời gian cho một vòng 360°"
        unit: "giây"
      direction:
        label: "Hướng"
        desc: "Chiều xoay (Xuôi/Ngược chiều kim đồng hồ)"
        options:
          cw:  { label: "Xuôi",  icon_ref: "glyphs.cw" }
          ccw: { label: "Ngược", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Ánh sáng"
        desc: "Môi trường ánh sáng có sẵn"
        options:
          studio:    { label: "Studio",   icon_ref: "glyphs.sun" }
          dramatic:  { label: "Kịch tính", icon_ref: "glyphs.bolt" }
          soft:      { label: "Dịu",      icon_ref: "glyphs.cloud" }
          workspace: { label: "Làm việc", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Tự động lưu vào thư mục có đóng dấu thời gian."
      format:
        label: "Định dạng"
        desc: "Video hoặc chuỗi hình ảnh"
        options: ["MP4 (H.264)", "GIF", "Chuỗi PNG"]
      resolution:
        label: "Độ phân giải"
        desc: "Kích thước và tỷ lệ khung hình"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Vuông)"]
      bg_color:
        label: "Màu nền"
        desc: "Màu đơn sắc cho vùng trong suốt"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "Khung dây"
        shaded: "Đổ bóng"
        both: "Cả hai"

    # ─────────────────────────────────────────────────────────────
    # 5. SYSTEM & FALLBACKS
    # ─────────────────────────────────────────────────────────────

    # SYSTEM CONTROLS
    system.controls:
      toggle_off: "Tắt"
      toggle_on: "Bật"
      toggle_info: "Thông tin"
      toggle_debug: "Gỡ lỗi"
      dropdown_placeholder: "Chọn tùy chọn"
      section_default: "Phần"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "Chọn"
      button:
        default:
          label: "Nút"
      preset_card:
        default:
          label: "Cài đặt"
      section:
        default:
          label: "Phần"
      badge:
        label: "Thư mục dự án"
