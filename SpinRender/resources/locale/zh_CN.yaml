    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "选择输出文件夹"
      select_output_directory: "选择输出目录"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "循环预设"
      parameters: "参数设置"
      output: "输出设置"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "外观"
      rotation_heading: "旋转设置"
      rotation_desc: "电路板：绕主轴定位 | 旋转：定位主轴本身"
      lighting_hint: "选择工作区以使用 KiCad 3D 查看器设置"
      system_logging: "系统日志"
      log_info: "日志保留30天，用于排除渲染故障。"
      open_logs: "打开日志文件夹"
      output_path:
        label: "输出路径"

      board_tilt:
        label: "电路板倾斜"
        desc: "电路板相对于摄像机的倾斜度"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "电路板滚动"
        desc: "电路板绕中心旋转"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "旋转倾斜"
        desc: "倾斜整个旋转轴"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "旋转航向"
        desc: "摄像机绕电路板旋转"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "旋转周期"
        desc: "完成360°旋转所需时间"
        unit: "秒"
      direction:
        label: "方向"
        desc: "旋转方向（顺时针或逆时针）"
        options:
          cw:  { label: "顺时针", icon_ref: "glyphs.cw" }
          ccw: { label: "逆时针", icon_ref: "glyphs.ccw" }
      lighting:
        label: "灯光"
        desc: "预设光照环境"
        options:
          studio:    { label: "影棚", icon_ref: "glyphs.sun" }
          dramatic:  { label: "戏剧", icon_ref: "glyphs.bolt" }
          soft:      { label: "柔和", icon_ref: "glyphs.cloud" }
          workspace: { label: "工作区", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "自动保存到带时间戳的目录。"
      format:
        label: "格式"
        desc: "视频或图像序列格式"
        options: ["MP4 (H.264)", "GIF", "PNG 序列"]
      resolution:
        label: "分辨率"
        desc: "输出尺寸和宽高比"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (方形)"]
      bg_color:
        label: "背景颜色"
        desc: "透明区域填充色"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "线框"
        shaded: "着色"
        both: "两者"

    # ─────────────────────────────────────────────────────────────
    # 5. SYSTEM & FALLBACKS
    # ─────────────────────────────────────────────────────────────

    # SYSTEM CONTROLS
    system.controls:
      toggle_off: "关闭"
      toggle_on: "开启"
      toggle_info: "信息"
      toggle_debug: "调试"
      dropdown_placeholder: "请选择选项"
      section_default: "部分"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "选择选项"
      button:
        default:
          label: "按钮"
      preset_card:
        default:
          label: "预设"
      section:
        default:
          label: "部分"
      badge:
        label: "项目文件夹"
