# SpinRender Localization — Chinese Simplified (CN)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  zh_CN:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      subtitle: "0.5.0-beta"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "展示"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "旋转"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "翻转"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "自定义"
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "渲染"
        icon_ref: "glyphs.render-action"
      stop:
        label: "停止"
        icon_ref: "glyphs.stop"
      cancel:
        label: "取消"
        icon_ref: "glyphs.close"
      ok:
        label: "确定"
        icon_ref: "glyphs.save"
      save:
        label: "保存"
        icon_ref: "glyphs.save"
      overwrite:
        label: "覆盖"
        icon_ref: "glyphs.alert"
      close:
        label: "关闭"
        icon_ref: "glyphs.close"
      closepreview:
        label: "关闭预览"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "预设"
        icon_ref: "glyphs.plus"
      browse:
        label: "浏览"
        icon_ref: "glyphs.folder"
      exit:
        label: "退出"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "就绪"
      rendering: "正在渲染第 {current}/{total} 帧"
      complete: "渲染完成"
      stopped: "渲染已停止"
      stopping: "正在停止渲染..."
      error: "错误: {message}"
      no_presets: "未找到保存的预设。"
      preparing: "正在准备渲染..."

    # BADGES
    component.badge:
      label: "项目文件夹"

