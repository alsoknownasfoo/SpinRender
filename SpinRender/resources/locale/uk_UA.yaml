        label: "Шлях виводу"

      board_tilt:
        label: "Нахил плати"
        desc: "Нахил плати відносно камери"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Крен плати"
        desc: "Обертання плати навколо центру"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Нахил осі"
        desc: "Нахил усієї осі обертання"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Напрям оберту"
