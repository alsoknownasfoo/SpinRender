          dramatic:  { label: "Драма", icon_ref: "glyphs.bolt" }
          soft:      { label: "М'яке", icon_ref: "glyphs.cloud" }
          workspace: { label: "Робоче", icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Автозбереження в папки з датою."
