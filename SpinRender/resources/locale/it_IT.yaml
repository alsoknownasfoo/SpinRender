        label: "Inclinaz. scheda"
        desc: "Inclina la scheda rispetto alla camera"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Rullio scheda"
        desc: "Ruota la scheda sul proprio centro"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Inclinaz. asse"
        desc: "Inclina l'intero asse di rotazione"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Direzione asse"
        desc: "Ruota la camera attorno alla scheda"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Periodo rotazione"
        desc: "Durata di un giro completo (360°)"
        unit: "sec"
      direction:
        label: "Direzione"
        desc: "Senso di rotazione (orario o antiorario)"
        options:
          cw:  { label: "OR",  icon_ref: "glyphs.cw" }
          ccw: { label: "ANT", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Illuminazione"
        desc: "Ambienti predefiniti"
        options:
          studio:    { label: "Studio",   icon_ref: "glyphs.sun" }
          dramatic:  { label: "Drammat.", icon_ref: "glyphs.bolt" }
          soft:      { label: "Soft",     icon_ref: "glyphs.cloud" }
          workspace: { label: "Spazio",   icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Salvataggio auto in cartelle datate."
      format:
        label: "Formato"
        desc: "Video o sequenza immagini"
        options: ["MP4 (H.264)", "GIF", "Sequenza PNG"]
      resolution:
        label: "Risoluzione"
        desc: "Dimensioni e proporzioni"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Quadrato)"]
      bg_color:
        label: "Colore sfondo"
        desc: "Colore solido per aree trasparenti"

