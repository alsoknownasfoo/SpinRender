        unit: "°"
      board_roll:
        label: "Roulis carte"
        desc: "Rotation de la carte sur elle-même"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Inclinaison pivot"
        desc: "Incliner tout l'axe de rotation"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Cap pivot"
        desc: "Rotation caméra autour de la carte"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Période rotation"
        desc: "Durée d'un tour complet (360°)"
        unit: "sec"
      direction:
        label: "Direction"
        desc: "Sens de rotation"
        options:
          cw:  { label: "SH",  icon_ref: "glyphs.cw" }
          ccw: { label: "SAH", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Éclairage"
        desc: "Environnements prédéfinis"
        options:
          studio:    { label: "Studio",    icon_ref: "glyphs.sun" }
          dramatic:  { label: "Dramatique", icon_ref: "glyphs.bolt" }
          soft:      { label: "Doux",      icon_ref: "glyphs.cloud" }
          workspace: { label: "Projet",    icon_ref: "glyphs.edit" }

