      card1:
        label: "Héros"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Rotation"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Bascule"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Perso. sel."
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Rendu"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Arrêter"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Annuler"
        icon_ref: "glyphs.close"
      ok:
        label: "OK"
        icon_ref: "glyphs.save"
      save:
        label: "Enreg."
        icon_ref: "glyphs.save"
      overwrite:
        label: "Écraser"
        icon_ref: "glyphs.alert"
      close:
        label: "Fermer"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Fermer vue"
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Préréglage"
        icon_ref: "glyphs.plus"
      browse:
        label: "Parcourir"
        icon_ref: "glyphs.folder"
      exit:
        label: "Quitter"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Prêt"
      rendering: "Rendu image {current}/{total}"
      complete: "Rendu terminé"
      stopped: "Rendu arrêté"
      stopping: "Arrêt du rendu..."
      error: "Erreur : {message}"
      no_presets: "Aucun préréglage trouvé."
      preparing: "Préparation du rendu..."

    # BADGES
    component.badge:
      label: "Dossier projet"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "Options avancées"
        header: "Options avancées"
        theme_desc: "Thème de l'interface."
        overrides_placeholder: "ex. --color-theme=theme"
        parameter_overrides_label: "Surcharge paramètres"
        see: " Voir "
        docs_link: "options kicad-cli render"
        section_output: "Chemin de sortie"
        section_overrides: "Surcharge paramètres"
        section_logging: "Journal système"
      save_preset:
        title: "Enreg. préréglage"
        header: "Enreg. préréglage"
        placeholder: "NOM_PRÉRÉGLAGE"
      recall_preset:
        title: "Sélect. préréglage perso"
        header: "Sélect. préréglage perso"
      filename:
        title: "Nom de fichier base"
        header: "Nom de fichier base"
        helper: "Les images sont sauvées en nom_00001.png, nom_00002.png, …"
      add_resolution:
        title: "Ajouter une résolution"
        header: "Ajouter une résolution"
        width_label: "L"
        height_label: "H"
        helper: "Entrez les dimensions de sortie en pixels (chiffres uniquement)."
        add_button: "Ajouter"
      custom_res:
        title: "Résolutions personnalisées"
        header: "Résolutions personnalisées"
        add_button: "Ajouter une résolution"
        empty: "Aucune résolution personnalisée pour le moment."
      render_error: "Erreur de rendu"
      preparing: "Préparation du rendu..."
      # Alerte si la carte n'a jamais été enregistrée sur le disque.
      save_required:
        title: "Erreur"
        message: "Ce document doit être enregistré avant de lancer SpinRender."
      # Affiché une fois par lancement sur Linux, où SpinRender n'a pas été testé.
      linux_warning:
        title: "Support Linux"
        message: "SpinRender n'a pas été testé sur Linux. Si vous rencontrez des problèmes, veuillez les signaler sur GitHub — vos commentaires aident à améliorer la compatibilité avec cette plateforme."
      # Préchauffage du cache des modèles 3D (affiché avant la fenêtre principale).
      warmup:
        title: "Démarrage de SpinRender"
        message: "Préparation des modèles 3D pour le rendu…"
        more_info: "Plus d'infos"
        detail: |-
          KiCad tesselle le modèle 3D de chaque composant la première fois qu'il est utilisé
          et met en cache le résultat — le même cache de modèles 3D que le visualiseur 3D de KiCad.

          Les cartes comportant de nombreux modèles ou des modèles très détaillés peuvent prendre
          plusieurs minutes à se préparer. Cela ne se reproduit que si vos fichiers de modèles 3D
          changent ; après cela, les rendus et l'aperçu sont rapides.
        elapsed: "Temps écoulé : {mins}m {secs:02d}s"
        required_title: "Démarrage de SpinRender"
        required_message: |-
          SpinRender ne peut pas démarrer sans préparer le cache des modèles 3D.

          Il s'agit des mêmes données de modèle 3D que celles du visualiseur 3D de KiCad, et cela ne doit être fait qu'une seule fois — jusqu'à ce que vos modèles 3D changent. Veuillez relancer SpinRender lorsque vous serez prêt à le laisser terminer.
      about:
        title: "À propos de SpinRender"
        check_updates:           "Chercher mises à jour"
        check_updates_progress:  "Recherche..."
        check_updates_done:      "À jour"
        check_updates_available: "MAJ dispo"
        check_updates_simulated: "(Sim)"
        update_via_pcm:          "Mise à jour via PCM"
        update_install:          "Mettre à jour vers"
        update_confirm:          "Télécharger et installer la dernière version maintenant ? KiCad doit être redémarré ensuite."
        update_installing:       "Installation..."
        update_done:             "Mis à jour — redémarrer KiCad"
        update_done_body:        "SpinRender a été mis à jour. Redémarrez KiCad pour charger la nouvelle version."
        update_failed:           "Échec de la mise à jour"
        update_failed_body:      "Impossible de mettre à jour automatiquement :"
        release_notes_label:     "Notes de version"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "Auteur"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "Soutenu par"
        license_tagline:         "Gratuit pour usage perso\nFaites un don !"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "Liens"
        discussions_label:       "Poser une question"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "Signaler un bug"
        readme_label:            "Aide + documentation"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "Licence"
        gpl_label:               "Licence GPLv3"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
        cc_url:                  "https://creativecommons.org/licenses/by-nc/4.0/"
        notices_label:           "Mentions open source"
        notices_url:             "https://github.com/alsoknownasfoo/SpinRender/blob/main/docs/NOTICES.md"
        github_sponsors_url:     "https://github.com/sponsors/alsoknownasfoo"
        kofi_url:                "https://ko-fi.com/alsoknownasfoo"
        license_label:           "LICENCE"
        license_text:            "OPEN SOURCE · GRATUIT POUR USAGE PERSONNEL"
        built_with_label:        "DÉVELOPPÉ AVEC"
        resources_label:         "RESSOURCES"
        sponsor_btn:             "SPONSORISER"
        version_prefix: "v"
        author: "alsoknownasfoo"
        author_prefix: "par "
        ai:
          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
