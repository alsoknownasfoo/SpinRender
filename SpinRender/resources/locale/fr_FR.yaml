      resolution:
        label: "Résolution"
        desc: "Dimensions et ratio"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Carré)"]
      bg_color:
        label: "Couleur de fond"
        desc: "Couleur pour zones transparentes"

