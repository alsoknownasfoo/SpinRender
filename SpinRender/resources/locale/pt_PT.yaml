# SpinRender Localization — Portuguese (PT)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  pt_PT:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      subtitle: "0.9.0-alpha"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "Hero"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Rotação"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Girar"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Sel. pers."
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Render"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Parar"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Cancelar"
        icon_ref: "glyphs.close"
      ok:
        label: "OK"
        icon_ref: "glyphs.save"
      save:
        label: "Guardar"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Substituir"
        icon_ref: "glyphs.alert"
      close:
        label: "Fechar"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Fechar prév."
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Preset"
        icon_ref: "glyphs.plus"
      browse:
        label: "Procurar"
        icon_ref: "glyphs.folder"
      exit:
        label: "Sair"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Pronto"
      rendering: "Render fotograma {current}/{total}"
      complete: "Render concluído"
      stopped: "Render parado"
      stopping: "A parar render..."
      error: "Erro: {message}"
      no_presets: "Nenhum preset encontrado."
      preparing: "A preparar render..."

    # BADGES
    component.badge:
      label: "Pasta do projeto"

