# SpinRender Localization — Portuguese (PT)
# Maps content (labels, icons) to component identifiers.
#
# Schema Version: v2

locale:
  pt_PT:
    # ─────────────────────────────────────────────────────────────
    # 1. COMPONENT CONTENT
    # ─────────────────────────────────────────────────────────────

    # APP HEADER
    component.main.header:
      title: "SpinRender"
      logo_id: "resources/icons/logo.svg"

    # PRESET CARDS
    component.preset_card:
      card1:
        label: "Hero"
        icon_ref: "glyphs.preset-hero"
      card2:
        label: "Rotação"
        icon_ref: "glyphs.preset-spin"
      card3:
        label: "Girar"
        icon_ref: "glyphs.preset-flip"
      card4:
        label: "Sel. pers."
        icon_ref: "glyphs.preset-custom"

    # BUTTONS
    component.button:
      render:
        label: "Render"
        icon_ref: "glyphs.render-action"
      stop:
        label: "Parar"
        icon_ref: "glyphs.stop"
      cancel:
        label: "Cancelar"
        icon_ref: "glyphs.close"
      ok:
        label: "OK"
        icon_ref: "glyphs.save"
      save:
        label: "Guardar"
        icon_ref: "glyphs.save"
      overwrite:
        label: "Substituir"
        icon_ref: "glyphs.alert"
      close:
        label: "Fechar"
        icon_ref: "glyphs.close"
      closepreview:
        label: "Fechar prév."
        icon_ref: "glyphs.close"
      options:
        label: ""
        icon_ref: "glyphs.settings"
      about:
        label: ""
        icon_ref: "glyphs.info"
      save_preset:
        label: "Preset"
        icon_ref: "glyphs.plus"
      browse:
        label: "Procurar"
        icon_ref: "glyphs.folder"
      exit:
        label: "Sair"
        icon_ref: "glyphs.exit-action"
      trash:
        label: ""
        icon_ref: "glyphs.trash"

    # STATUS MESSAGES
    component.status:
      ready: "Pronto"
      rendering: "Render fotograma {current}/{total}"
      complete: "Render concluído"
      stopped: "Render parado"
      stopping: "A parar render..."
      error: "Erro: {message}"
      no_presets: "Nenhum preset encontrado."
      preparing: "A preparar render..."

    # BADGES
    component.badge:
      label: "Pasta do projeto"

    # ─────────────────────────────────────────────────────────────
    # 2. GLOBAL UI STRINGS
    # ─────────────────────────────────────────────────────────────

    # DIALOGS
    dialog:
      advanced:
        title: "Opções avançadas"
        header: "Opções avançadas"
        theme_desc: "Tema da interface."
        overrides_placeholder: "ex: --color-theme=theme"
        parameter_overrides_label: "Substituir parâmetros"
        see: " Ver "
        docs_link: "opções kicad-cli render"
        section_output: "Caminho de saída"
        section_overrides: "Substituir parâmetros"
        section_logging: "Log do sistema"
      save_preset:
        title: "Guardar preset"
        header: "Guardar preset"
        placeholder: "NOME_PRESET"
      recall_preset:
        title: "Selecionar preset"
        header: "Selecionar preset"
      filename:
        title: "Nome de ficheiro base"
        header: "Nome de ficheiro base"
        helper: "Fotogramas guardados como nome_00001.png, nome_00002.png, …"
      add_resolution:
        title: "Adicionar resolução"
        header: "Adicionar resolução"
        width_label: "L"
        height_label: "A"
        helper: "Introduza as dimensões de saída em píxeis (apenas números)."
        add_button: "Adicionar"
      custom_res:
        title: "Resoluções personalizadas"
        header: "Resoluções personalizadas"
        add_button: "Adicionar resolução"
        empty: "Ainda não existem resoluções personalizadas."
      render_error: "Erro de renderização"
      preparing: "A preparar render..."
      # Aviso de salvaguarda quando a placa nunca foi guardada no disco.
      save_required:
        title: "Erro"
        message: "Este documento precisa de ser guardado antes de iniciar o SpinRender."
      # Mostrado uma vez por sessão no Linux, onde o SpinRender não foi testado.
      linux_warning:
        title: "Suporte para Linux"
        message: "SpinRender não foi testado no Linux. Se encontrares problemas, por favor relata-os no GitHub — o teu feedback ajuda a melhorar o suporte para esta plataforma."
      # Preparação da cache de modelos 3D (mostrada antes da janela principal).
      warmup:
        title: "A iniciar o SpinRender"
        message: "A preparar modelos 3D para renderização…"
        more_info: "Mais informações"
        detail: |-
          O KiCad tessela o modelo 3D de cada componente na primeira vez que é utilizado e armazena o resultado em cache — a mesma cache de modelos 3D que o próprio Visualizador 3D do KiCad constrói.

          Placas com muitos modelos ou modelos altamente detalhados podem demorar vários minutos a preparar. Só volta a acontecer se os ficheiros dos seus modelos 3D mudarem; depois disso, as renderizações e a pré-visualização são rápidas.
        elapsed: "Decorrido: {mins}m {secs:02d}s"
        required_title: "A iniciar o SpinRender"
        required_message: |-
          O SpinRender não pode ser iniciado sem preparar a cache de modelos 3D.

          Estes são os mesmos dados de modelos 3D que o próprio Visualizador 3D do KiCad constrói, e só precisa de ser feito uma vez — até que os seus modelos 3D mudem. Por favor, reinicie o SpinRender quando estiver pronto para o deixar terminar.
      about:
        title: "Sobre o SpinRender"
        check_updates:           "Procurar atualizações"
        check_updates_progress:  "A procurar..."
        check_updates_done:      "Atualizado"
        check_updates_available: "Atualiz. disp."
        check_updates_simulated: "(Sim)"
        update_via_pcm:          "Atualizar via PCM"
        update_install:          "Atualizar para"
        update_confirm:          "Transferir e instalar a versão mais recente agora? O KiCad deve ser reiniciado depois."
        update_installing:       "A instalar..."
        update_done:             "Atualizado — reiniciar o KiCad"
        update_done_body:        "O SpinRender foi atualizado. Reinicie o KiCad para carregar a nova versão."
        update_failed:           "A atualização falhou"
        update_failed_body:      "Não foi possível atualizar automaticamente:"
        release_notes_label:     "Notas de lançamento"
        releases_url:            "https://github.com/alsoknownasfoo/SpinRender/releases"
        section_author:          "Autor"
        author_github_label:     "alsoknownasfoo"
        author_github_url:       "https://github.com/alsoknownasfoo"
        author_website_label:    "alsoknownasfoo.com"
        author_website_url:      "https://alsoknownasfoo.com"
        section_supported_by:    "Suportado por"
        license_tagline:         "Grátis para uso pessoal\nDoe se gostar!"
        github_sponsors_label:   "GitHub Sponsors"
        kofi_label:              "Ko-fi"
        section_links:           "Links"
        discussions_label:       "Fazer uma pergunta"
        repo_label:              "/alsoknownasfoo/SpinRender"
        issues_label:            "Reportar um erro"
        readme_label:            "Ajuda + documentação"
        repo_url:                "https://github.com/alsoknownasfoo/SpinRender"
        section_license:         "Licença"
        gpl_label:               "Licença GPLv3"
        gpl_url:                 "https://github.com/alsoknownasfoo/SpinRender/blob/main/LICENSE"
        cc_label:                "CC BY-NC 4.0"
        cc_url:                  "https://creativecommons.org/licenses/by-nc/4.0/"
        notices_label:           "Avisos de código aberto"
        notices_url:             "https://github.com/alsoknownasfoo/SpinRender/blob/main/docs/NOTICES.md"
        github_sponsors_url:     "https://github.com/sponsors/alsoknownasfoo"
        kofi_url:                "https://ko-fi.com/alsoknownasfoo"
        license_label:           "LICENÇA"
        license_text:            "CÓDIGO ABERTO · GRATUITO PARA USO PESSOAL"
        built_with_label:        "CRIADO COM"
        resources_label:         "RECURSOS"
        sponsor_btn:             "PATROCINAR"
        version_prefix: "v"
        author: "alsoknownasfoo"
        author_prefix: "por "
        ai:
          claude_url:            "https://claude.ai/"
          gemini_url:            "https://gemini.google.com/"
          chatgpt_url:           "https://chatgpt.com/"
          copilot_url:           "https://github.com/features/copilot"
          stepfun_url:           "https://stepfun.ai/chats/new"

    # DIRECTORY DIALOGS
    dir_dialog:
      select_output_folder: "Selecionar pasta de saída"
      select_output_directory: "Selecionar diretório de saída"

    # SECTIONS (Side-panel headers)
    sections:
      presets: "Presets de loop"
      parameters: "Parâmetros"
      output: "Config. de saída"

    # ─────────────────────────────────────────────────────────────
    # 3. PARAMETERS & OUTPUT
    # ─────────────────────────────────────────────────────────────

    # PARAMETERS (Sliders & Inputs)
    parameters:
      appearance:
        label: "Aparência"
      rotation_heading: "Rotação"
      rotation_desc: "Placa: orientar no eixo | Giro: rodar o eixo"
      lighting_hint: "Use o espaço trabalho para definições KiCad"
      system_logging: "Log do sistema"
      log_info: "Os logs são guardados 30 dias. Úteis para erros."
      open_logs: "Abrir pasta de logs"
      output_path:
        label: "Caminho de saída"

      board_tilt:
        label: "Inclinação placa"
        desc: "Inclinar a placa relativo à câmara"
        icon_ref: "glyphs.axis-x"
        unit: "°"
      board_roll:
        label: "Rotação placa"
        desc: "Rodar a placa no seu centro"
        icon_ref: "glyphs.axis-y"
        unit: "°"
      spin_tilt:
        label: "Inclinação giro"
        desc: "Inclinar todo o eixo de rotação"
        icon_ref: "glyphs.axis-y-rot"
        unit: "°"
      spin_heading:
        label: "Rumo do giro"
        desc: "Rodar a câmara à volta da placa"
        icon_ref: "glyphs.axis-z-rot"
        unit: "°"
      period:
        label: "Período rotação"
        desc: "Duração de uma volta completa (360°)"
        unit: "seg"
      direction:
        label: "Direção"
        desc: "Sentido de rotação (Horário ou Anti-Horário)"
        options:
          cw:  { label: "Hor", icon_ref: "glyphs.cw" }
          ccw: { label: "Ant", icon_ref: "glyphs.ccw" }
      lighting:
        label: "Iluminação"
        desc: "Ambientes predefinidos"
        options:
          studio:    { label: "Estúdio",   icon_ref: "glyphs.sun" }
          dramatic:  { label: "Dramático", icon_ref: "glyphs.bolt" }
          soft:      { label: "Suave",     icon_ref: "glyphs.cloud" }
          workspace: { label: "Espaço",    icon_ref: "glyphs.edit" }

    # OUTPUT SETTINGS
    output:
      auto_desc: "Guardado auto. em pastas com carimbo data/hora."
      board_options:
        label: "Opções de renderização"
      format:
        label: "Formato"
        desc: "Formato de vídeo ou sequência de imagens"
        options: ["MP4 (H.264)", "GIF", "Sequência PNG"]
      hide_vias:
        label: "VIAS"
      hide_components:
        label: "COMPONENTES"
      hide_test_points:
        label: "PONTOS DE TESTE (REFS T#)"
      resolution:
        label: "Resolução"
        desc: "Dimensões de saída e proporção"
        options: ["1920×1080 (1080P)", "1280×720 (720P)", "800×800 (Quadrado)"]
        custom_label: "Personalizado ({w}×{h})"
      bg_color:
        label: "Cor de fundo"
        desc: "Cor sólida para áreas transparentes"

    # ─────────────────────────────────────────────────────────────
    # 4. VIEWPORT
    # ─────────────────────────────────────────────────────────────
    viewport:
      mode:
        wireframe: "Estrutura"
        shaded: "Sombreado"
        both: "Ambos"

    # ─────────────────────────────────────────────────────────────
    # 5. SYSTEM & FALLBACKS
    # ─────────────────────────────────────────────────────────────

    # SYSTEM CONTROLS
    system.controls:
      toggle_off: "Off"
      toggle_on: "On"
      toggle_info: "Info"
      toggle_debug: "Debug"
      dropdown_placeholder: "Selecionar opção"
      section_default: "Secção"

    # COMPONENT DEFAULTS
    components:
      dropdown:
        default:
          label: "Escolher"
      button:
        default:
          label: "Botão"
      preset_card:
        default:
          label: "Preset"
      section:
        default:
          label: "Secção"
      badge:
        label: "Pasta do projeto"
