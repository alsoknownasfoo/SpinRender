# SpinRender Theme — Light
# Note: STYLING ONLY. All text/icon content is in locale_en.yaml.

# ─────────────────────────────────────────────────────────────────
# 1. COLORS (Global Design Tokens & Semantic Roles)
# ─────────────────────────────────────────────────────────────────
colors:
  # Auto State Shifts (for undefined states, e.g. hover/active on buttons)
  auto_states:
    hover: rgb(-30, -30, -30) # Darken by 30 for hover (base is light)
    active: rgb(-60, -60, -60) # Darken by 60 for active
    disabled: rgb(0, 0, 0, 0.35) # 35% opacity for disabled

  # Base Palette (Primes) — inverted from dark theme
  gray-black:  "#F5F5F5"   # main app bg (was #0D0D0D)
  gray-dark:   "#FFFFFF"   # dialog / card bg (was #121212)
  gray-div:    "#EEEEEE"   # dividers (was #1A1A1A)
  gray-border: "#E0E0E0"   # borders (was #222222)
  gray-medium: "#555555"   # body text / headers (was #444444)
  gray-light:  "#888888"   # secondary / label text (was #646464)
  gray-text:   "#AAAAAA"   # placeholder / faint (was #777777)
  gray-white:  "#1A1A1A"   # primary foreground text (was #E0E0E0)
  white:       "#FFFFFF"
  white-68:    "rgba(255,255,255,0.68)"
  black:       "#000000"
  transparent: "rgba(0,0,0,0)"
  cyan-muted:  "rgba(0, 151, 167, 0.3)"

  # Accent palette — slightly deepened for contrast on light backgrounds
  cyan:        "#0097A7"
  yellow:      "#F9A825"
  green:       "#388E3C"
  orange:      "#E64A19"
  red:         "#C62828"
  purple:      "#7B1FA2"
  pink:        "#AD1457"

  # Light tint variants (hover backgrounds on white)
  cyan-10:     "#E6F8FA"
  yellow-10:   "#FFFDE6"
  green-10:    "#E8F5E9"
  orange-10:   "#FBE9E7"
  red-10:      "#FFEBEE"
  purple-10:   "#F3E5F5"
  pink-10:     "#FCE4EC"

  cyan-20:     "#B2EBF2"
  yellow-20:   "#FFF9C4"
  green-20:    "#C8E6C9"
  orange-20:   "#FFCCBC"
  red-20:      "#FFCDD2"
  purple-20:   "#E1BEE7"
  pink-20:     "#F8BBD0"

  cyan-50:        "#0097A766"
  yellow-50:      "#F9A82566"
  green-50:       "#388E3C66"
  orange-50:      "#E64A1966"
  red-50:         "#C6282866"
  purple-50:      "#7B1FA266"
  pink-50:        "#AD145766"

  # Semantic Roles (Theme)
  primary:     "@colors.cyan"
  secondary:   "@colors.yellow"
  tertiary:    "@colors.purple"
  quaternary:  "@colors.pink"
  ok:          "@colors.green"
  warning:     "@colors.orange"
  error:       "@colors.red"

  # Brand Colors (External Services — used in About dialog)
  brand:
    github-sponsors: "#ea4aaa"
    kofi:            "#29ABE0"
    kofi-base:       "#C8A27A"
    ai:
      claude:        "#d97757"
      gemini:        "#3186FF"
      chatgpt:       "#12a37f"
      copilot:       "#7c3aed"
      stepfun:       "#068cff"
      unknown:       "#888888"

# ─────────────────────────────────────────────────────────────────
# 2. RADIUS (Rounding Scale)
# ─────────────────────────────────────────────────────────────────
radius:
  none: 0
  sm:   4
  md:   6
  lg:   8
  full: 9999

# ─────────────────────────────────────────────────────────────────
# 3. BORDERS (Width Scales & Roles)
# ─────────────────────────────────────────────────────────────────
borders:
  width:
    none:   0
    thin:   1
    medium: 2

  # Semantic Roles
  none:
    size: "@borders.width.none"
    color: "@colors.transparent"
  default:
    size: "@borders.width.thin"
    color: "@colors.gray-border"
  subtle:
    size: "@borders.width.thin"
    color: "@colors.gray-border"
  button:
    size: "@borders.width.thin"
    color: "@colors.gray-medium"
  focus:
    size: "@borders.width.thin"
    color: "@colors.primary"
  strong:
    size: "@borders.width.medium"
    color: "@colors.primary"

# ─────────────────────────────────────────────────────────────────
# 3a. DIVIDERS (Separator Lines)
# ─────────────────────────────────────────────────────────────────
dividers:
  width:
    thin:  1
    medium: 2

  # Semantic Roles - Separator lines between UI sections
  # Lighter than borders to create visual contrast and hierarchy
  default:
    size: "@dividers.width.thin"
    color: "@colors.gray-div"

# ─────────────────────────────────────────────────────────────────
# 4. TYPOGRAPHY (Scales & Roles)
# ─────────────────────────────────────────────────────────────────
typography:
  families:
    mono:    "JetBrains Mono"
    display: "Oswald"
    icon:    "Material Design Icons"

  weights:
    hairline: 100
    thin:     200
    light:    300
    normal:   400
    medium:   500
    semibold: 600
    bold:     700
    extrabold: 800
    black:    900

  scale:
    xs: 7
    sm: 9
    base: 11
    md: 14
    lg: 18
    xl: 24
    icon: 16
    icon-lg: 20

  spacing:
    none: 0
    xs:   4
    sm:   6
    base: 10
    md:   16
    lg:   24

# ─────────────────────────────────────────────────────────────────
# 5. TEXT STYLES (Global Roles)
# ─────────────────────────────────────────────────────────────────
text:
  title:
    color: "@colors.gray-white"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.display"
      size: "@typography.scale.lg"
      weight: "@typography.weights.bold"
  subtitle:
    color: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.bold"
  header:
    color: "@colors.gray-white"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.display"
      size: "@typography.scale.md"
      weight: "@typography.weights.semibold"
  subheader:
    color: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  body:
    color: "@colors.gray-medium"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.normal"
  body_strong:
    ref: "@text.body"
    font:
      weight: "@typography.weights.semibold"
  numeric:
    color: "@colors.secondary"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  links:
    color: "@colors.gray-light"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.semibold"
  metadata:
    color: "@colors.gray-text"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.normal"
  description:
    color: "@colors.gray-medium"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.normal"
  label:
    color: "@colors.gray-text"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.semibold"
  button:
    color:
      default: "@colors.gray-light"
      hover: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  nav:
    color:
      default: "@colors.gray-text"
      hover: "@colors.primary"
      active: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.bold"
  dropdown:
    color: "@colors.gray-light"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  status:
    color: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.bold"
  icon:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.icon"
      size: "@typography.scale.md"
      weight: "@typography.weights.normal"
  icon_lg:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.icon"
      size: "@typography.scale.lg"
      weight: "@typography.weights.normal"

# ─────────────────────────────────────────────────────────────────
# 6. GLYPHS (Symbol Aliases)
# ─────────────────────────────────────────────────────────────────
glyphs:
  # App Actions
  render-action: "\U000F0A1C"
  exit-action:   "\U000F0206"
  settings:      "\U000F0493"
  save:          "\U000F012C"
  folder:        "\U000F024B"
  close:         "\U000F0156"
  stop:          "\U000F04DB"
  trash:         "\U000F0A7A"
  info:          "\U000F02FD"
  alert:         "\U000F0CF0"
  plus:          "\U000F0130"
  help:          "\U000F02D6"

  # Controls
  cw:            "\U000F0453"
  ccw:           "\U000F0459"
  sun:           "\U000F0599"
  moon:          "\U000F0594"
  computer:      "\U000F0379"
  bolt:          "\U000F033F"
  cloud:         "\U000F02F9"
  edit:          "\U000F0052"

  # Status
  status-ok:     "\U000F05E0"
  status-error:  "\U000F0156"
  alert-octagram: "\U000F0767"

  # Axis
  axis-x:        "\U000F0D4C"
  axis-y:        "\U000F0D51"
  axis-y-rot:    "\U000F0D54"
  axis-z-rot:    "\U000F0D58"

  # Presets
  preset-hero:   "\U000F0465"
  preset-spin:   "\U000F1999"
  preset-flip:   "\U000F0D98"
  preset-custom: "\U000F166B"

  # About dialog
  github:        "\U000F02A4"
  heart:         "\U000F02D1"
  web:           "\U000F059F"
  tag:           "\U000F04F6"
  help-circle:   "\U000F02D7"
  release:       "\U000F04F9"
  discussions:   "\U000F0361"
  issues:        "\U000F00E4"
  readme:        "\U000F14F7"
  file:          "\U000F0FC3"
  notices:       "\U000F03D7"
  coffee:        "\U000F0176"
  gift:          "\U000F0E44"

  # Navigation
  chevron-down:  "\U000F0140"
  chevron-up:    "\U000F0143"

# ─────────────────────────────────────────────────────────────────
# 7. VIEWPORT
# ─────────────────────────────────────────────────────────────────
viewport:
  bg: "@colors.black" # keep viewport dark even in light mode
  grid: "@colors.gray-medium"
  wireframe: null
  axes:
    x: "@colors.red"
    y: "@colors.green"
    z: "@colors.cyan"

# ─────────────────────────────────────────────────────────────────
# 8. LAYOUT (Application Layout Definitions)
# ─────────────────────────────────────────────────────────────────
layout:
  # Main application layout (left panel, right panel, header, etc.)
  main:
    frame:
      bg: "@colors.gray-black"
      radius: "@radius.none"
    header:
      bg: "@colors.gray-black"
      logo: "@colors.primary"
      title: "@text.title"
      subtitle: "@text.subtitle"
    leftpanel:
      bg: "@colors.gray-black"
      width: 450
      headers: "@text.header"
      subheaders: "@text.subheader"
      body: "@text.body"
      descriptions: "@text.description"
      border: "@borders.default"
      scrollbar: "@components.scrollbar"
      padding: 16
      # Control group spacing (subheader → control → description)
      control:
        heading_gap:     "@typography.spacing.sm"   # 6  — gap below subheader, above its control
        description_gap: "@typography.spacing.xs"   # 4  — gap between a control and its helper/description text
        between_items:   "@typography.spacing.base" # 10 — vertical gap between separate control groups
      # Export section button spacing (gap between options/close/render)
      export:
        gap: 8  # Half of panel padding (16/2)
    divider:
      bg: "@dividers.default.color"
      size: 1
    rightpanel:
      bg: "@colors.black"
      shader: "@text.nav"
      title: "@text.title"
      info:
        ref: "@text.metadata"
        color: "@colors.gray-text"
        font:
          typeface: "@typography.families.mono"
          size: "@typography.scale.base"
          weight: "@typography.weights.normal"
    status: "@components.status"

  # Modal dialog layouts
  dialogs:
    default:
      frame:
        width: 600
        height: 500
        bg: "@colors.gray-dark"
        border: "@borders.default"
        radius: "@radius.md"
        shadow:
          size: 16
          color: "@colors.black"
      header:
        bg: "@colors.gray-black"
        border: "@borders.default"
        height: 48
        title: "@text.header"
      body:
        bg: "@colors.gray-dark"
        padding:
          all: "@typography.spacing.lg"
        text: "@text.body"
        description: "@text.description"
        section_label: "@text.subheader"
      controls:
        bg: "@colors.gray-dark"
        border: None
        gap: "@typography.spacing.base"
        button1:
          ref: "@components.button.ok"
        button2:
          ref: "@components.button.cancel"
    filename:
      ref: "@layout.dialogs.default"
      frame:
        width: 300
        height: 220
      controls:
        padding: 16
        gap: 8
        button1:
          ref: "@components.button.cancel"
          width: "50%"
        button2:
          ref: "@components.button.save"
          width: "50%"
    options:
      ref: "@layout.dialogs.default"
      frame:
        width: 600
        height: 640
      body:
        links: "@text.links"
    presets:
      ref: "@layout.dialogs.default"
      frame:
        width: 300
        height: 250
      controls: None
    addpreset:
      ref: "@layout.dialogs.default"
      frame:
        width: 300
        height: 180
      controls:
        button1:
          ref: "@components.button.save"
          width: "50%"
        button2:
          ref: "@components.button.cancel"
          width: "50%"
    about:
      ref: "@layout.dialogs.default"
      frame:
        width: 480
        height: 456
      body:
        section_label:
          color: "@colors.primary"
          formatting: "uppercase"
          font:
            typeface: "@typography.families.mono"
            size: "@typography.scale.sm"
            weight: "@typography.weights.bold"
        version_badge:
          color: "@colors.primary"
          formatting: "uppercase"
          font:
            typeface: "@typography.families.mono"
            size: "@typography.scale.sm"
            weight: "@typography.weights.bold"
        license_tagline:
          color: "@colors.gray-light"
          formatting: "uppercase"
          font:
            typeface: "@typography.families.mono"
            size: "@typography.scale.sm"
            weight: "@typography.weights.bold"
        gift_icon:
          color: "@colors.orange"
        link_label:
          color: "@colors.gray-medium"
          font:
            typeface: "@typography.families.mono"
            size: "@typography.scale.base"
            weight: "@typography.weights.normal"
        link_arrow:
          color: "@colors.primary"
          font:
            typeface: "@typography.families.mono"
            size: "@typography.scale.base"
            weight: "@typography.weights.normal"
        link_icon:
          color: "@colors.gray-medium"
          font:
            typeface: "@typography.families.icon"
            size: "@typography.scale.base"
            weight: "@typography.weights.normal"

# ─────────────────────────────────────────────────────────────────
# 9. COMPONENT DEFINITIONS (Atomic UI Components)
# ─────────────────────────────────────────────────────────────────x
components:
  section_label:
    label:
      ref: "@text.header"

  badge:
    frame:
      height: 18
      bg: "@colors.cyan"
      radius: "@radius.sm"
      padding:
        horizontal: "@typography.spacing.sm"
    icon:
      ref: "@text.icon"
    label:
      font:
        typeface: "@typography.families.mono"
        size: "@typography.scale.base"
        weight: "@typography.weights.bold"
      color: "@colors.white"
      formatting: "uppercase"
    gap: "@typography.spacing.sm"

  preset_card:
    default:
      frame:
        width: 90
        height: 64
        bg:
          default: "@colors.transparent"
          hover: "@colors.cyan-20"
          active: "@colors.primary"
        border:
          size: "@borders.subtle.size"
          color:
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
            active: "@colors.transparent"
        radius: "@radius.lg"
        padding:
          vertical: "@typography.spacing.sm"
        cursor: "hand"
      gap: 8
      icon:
        ref: "@text.icon_lg"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
          active: "@colors.gray-dark"
      label:
        ref: "@text.button"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
          active: "@colors.gray-dark"
    card1: "@components.preset_card.default"
    card2: "@components.preset_card.default"
    card3: "@components.preset_card.default"
    card4: "@components.preset_card.default"

  input:
    default:
      type: "text" # type can be text, numeric, or rich (for file paths with browse button)
      editable: true # readonly bool
      case: "none" # for text inputs, can be none, upper, or lower
      icon_style:
        ref: "@text.icon"
      label: # unit suffix label (e.g. "°", "f")
        ref: "@text.numeric"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
      frame:
        height: 32 # height of field
        bg: # bg of field
          default: "@colors.gray-black"
          hover: "@colors.cyan-20"
        radius: "@radius.md" # border radius of field
        border: # border of field
          size: 1 # border size
          color: # border color
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
            active: "@colors.primary"
      color: # text color
        default: "@colors.gray-light"
        hover: "@colors.primary"
        active:  "@colors.primary"
      font: "@text.numeric.font" # font
      selection: "@colors.cyan-20" # highlight selection color
      alignment: "center" # text alignment
      placeholder:
        color: "@colors.gray-medium"
      error:
        color: "@colors.error"
        border:
          size: "@borders.width.medium"
          color: "@colors.error"
    path:
      ref: "@components.input.default"
      type: "rich"
      alignment: "left"
      icon:
        ref: "glyphs.folder"
        color: "@colors.primary"
      frame:
        height: 36
        bg:
          default: "@colors.transparent"
          hover: "@colors.cyan-20"
      color:
        default: "@colors.gray-white"
        hover: "@colors.primary"
        active: "@colors.primary"
    axis:
      ref: "@components.input.default"
      type: "numeric"
      alignment: "right"
      unit: "°"
      step: 0.1
      frame:
        height: 32
    speed:
      ref: "@components.input.default"
      type: "numeric"
      alignment: "right"
      unit: "f"
      step: 0.1
      frame:
        height: 32
    parameters:
      ref: "@components.input.default"
      type: "text"
      alignment: "left"
      multiline: true
      frame:
        height: 84
        bg:
          default: "@colors.gray-black"
          hover: "@colors.cyan-20"
    hex:
      ref: "@components.input.default"
      case: "upper"
      alignment: "center"
      prefix: "#"
      frame:
        height: 32

  slider:
    default:
      frame:
        height: 18
      icon:
        ref: "@text.icon"
      label:
        ref: "@text.label"
      track:
        frame:
          height: 8
          radius: "@radius.sm"
        color:
          default: "@colors.gray-border"
          hover: "@colors.cyan-20"
        border: "@borders.width.none"
      nub:
        width: 1
        height: 14
        border: "@borders.width.none"
        color: "@colors.primary"
      input: "@components.input.axis"
    primary:
      ref: "@components.slider.default"
      nub: { color: "@colors.yellow" }
    secondary:
      ref: "@components.slider.default"
      nub: { color: "@colors.orange" }
    tertiary:
      ref: "@components.slider.default"
      nub: { color: "@colors.purple" }
    quaternary:
      ref: "@components.slider.default"
      nub: { color: "@colors.pink" }

  toggle:
    default:
      frame:
        height: 32
        radius: "@radius.md"
        bg:
          default: "@colors.gray-div"
          hover: "@colors.cyan-20"
        border:
          size: "@borders.subtle.size"
          color:
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
      gap: "@typography.spacing.sm"
      items: # individual toggle items
        frame:
          bg:
            default: "@colors.transparent"
            hover: "@colors.transparent"
            active: "#008D9D"  # cyan #0097A7 darkened -10 for readability
        icon:
          ref: "@text.icon"
          color:
            default: "@colors.gray-light"
            hover: "@colors.primary"
            active: "@colors.white"  # white icon on cyan active bg
        label:
          ref: "@text.label"
          color:
            default: "@colors.gray-light"
            hover: "@colors.primary"
            active: "@colors.white"  # white text on cyan active bg
    direction:
      ref: "@components.toggle.default"
    lighting:
      ref: "@components.toggle.default"
      items:
        frame:
          bg:
            default: "@colors.transparent"
            hover: "@colors.transparent"
            active: "#EF9E1B"  # yellow #F9A825 darkened -10 for readability
        label:
          ref: "@text.label"
          color:
            default: "@colors.gray-light"
            hover: "@colors.cyan"
            active: "@colors.white"  # white text on yellow active bg
        icon:
          color:
            default: "@colors.gray-light"
            hover: "@colors.cyan"
            active: "@colors.white"  # white icon on yellow active bg
    logging: "@components.toggle.default"

  dropdown:
    default: # default styles for all dropdowns, individual dropdowns can override specific properties
      frame:
        height: 32 # main module height
        bg:
          default: "@colors.transparent" # main module bg
          hover: "@colors.cyan-20"
        radius: "@radius.md" # main module radius
        border:
          size: "@borders.width.thin"
          color:
            default: "@colors.gray-border"
            hover: "@colors.transparent"
            active: "@colors.transparent" # main module while dropdown is open
      label: # main module text font and color
        font: "@text.numeric.font" # Use numeric font like axis inputs
        color:
          default: "@colors.gray-light"  # Match axis input field color
          hover: "@colors.primary"
      icon: # main module chevron color
        ref: "@text.icon"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
      menu: # popout menu container
        frame:
          bg: "@colors.gray-dark" # menu container bg
          radius: "@radius.md" # menu container radius
          border: "@borders.subtle" # menu container border
        items: # menu item styles
          bg:
            default: "@colors.transparent" # menu item bg
            hover: "@colors.cyan-20"
            active: "@colors.primary" # selected state
          radius: "@radius.md" # menu items have no border
