# SpinRender Theme — Dark (Default)
# Note: STYLING ONLY. All text/icon content is in locale_en.yaml.

# ─────────────────────────────────────────────────────────────────
# 1. COLORS (Global Design Tokens & Semantic Roles)
# ─────────────────────────────────────────────────────────────────
colors:
  # Auto State Shifts (for undefined states, e.g. hover/active on buttons)
  auto_states:
    hover: rgb(60, 60, 60) # Lighten by 10 for hover
    active: rgb(-60, -60, -60) # Darken by 10 for active
    disabled: rgb(0, 0, 0, 0.5) # 50% opacity for disabled

  # Base Palette (Primes)
  gray-black:  "#0D0D0D"
  gray-dark:   "#121212"
  gray-div:    "#1A1A1A"
  gray-border: "#222222"
  gray-medium: "#444444"
  gray-light:  "#646464"
  gray-text:   "#777777"
  gray-white:  "#E0E0E0"
  white:       "#FFFFFF"
  white-68:    "rgba(255,255,255,0.68)"
  black:       "#000000"
  transparent: "rgba(0,0,0,0)"
  cyan-muted:  "rgba(100, 200, 220, 0.6)"

  cyan:        "#00BCD4"
  yellow:      "#FFD600"
  green:       "#4CAF50"
  orange:      "#FF6B35"
  red:         "#FF3B30"
  purple:      "#AA6BFF"
  pink:        "#F240FF"

  cyan-10:     "#001315"
  yellow-10:   "#1A1500"
  green-10:    "#081208"
  orange-10:   "#1A0B05"
  red-10:      "#1A0605"
  purple-10:   "#110B1A"
  pink-10:     "#180A1A"

  cyan-20:     "#00262A"
  yellow-20:   "#332B00"
  green-20:    "#0F2310"
  orange-20:   "#331515"
  red-20:      "#330C0A"
  purple-20:   "#221535"
  pink-20:     "#300D33"

  # Semantic Roles (Theme)
  primary:     "@colors.cyan"
  secondary:   "@colors.yellow"
  tertiary:    "@colors.purple"
  quaternary:  "@colors.pink"
  ok:          "@colors.green"
  warning:     "@colors.orange"
  error:       "@colors.red"

# ─────────────────────────────────────────────────────────────────
# 2. RADIUS (Rounding Scale)
# ─────────────────────────────────────────────────────────────────
radius:
  none: 0
  sm:   4
  md:   6
  lg:   8
  full: 9999

# ─────────────────────────────────────────────────────────────────
# 3. BORDERS (Width Scales & Roles)
# ─────────────────────────────────────────────────────────────────
borders:
  width:
    none:   0
    thin:   1
    medium: 2

  # Semantic Roles
  none:
    size: "@borders.width.none"
    color: "@colors.transparent"
  default:
    size: "@borders.width.thin"
    color: "@colors.gray-border"
  subtle:
    size: "@borders.width.thin"
    color: "@colors.gray-border"
  button:
    size: "@borders.width.thin"
    color: "@colors.gray-medium"
  focus:
    size: "@borders.width.thin"
    color: "@colors.primary"
  strong:
    size: "@borders.width.medium"
    color: "@colors.primary"

# ─────────────────────────────────────────────────────────────────
# 3a. DIVIDERS (Separator Lines)
# ─────────────────────────────────────────────────────────────────
dividers:
  width:
    thin:  1
    medium: 2

  # Semantic Roles - Separator lines between UI sections
  # Lighter than borders to create visual contrast and hierarchy
  default:
    size: "@dividers.width.thin"
    color: "@colors.gray-div"

# ─────────────────────────────────────────────────────────────────
# 4. TYPOGRAPHY (Scales & Roles)
# ─────────────────────────────────────────────────────────────────
typography:
  families:
    mono:    "JetBrains Mono"
    display: "Oswald"
    icon:    "Material Design Icons"

  weights:
    hairline: 100
    thin:     200
    light:    300
    normal:   400
    medium:   500
    semibold: 600
    bold:     700
    extrabold: 800
    black:    900

  scale:
    xs: 7
    sm: 9
    base: 11
    md: 14
    lg: 18
    xl: 24
    icon: 16
    icon-lg: 20

  spacing:
    none: 0
    sm:   6
    base: 10
    md:   16
    lg:   24

# ─────────────────────────────────────────────────────────────────
# 5. TEXT STYLES (Global Roles)
# ─────────────────────────────────────────────────────────────────
text:
  title:
    color: "@colors.gray-white"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.display"
      size: "@typography.scale.lg"
      weight: "@typography.weights.bold"
  subtitle:
    color: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.bold"
  header:
    color: "#333333"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.display"
      size: "@typography.scale.md"
      weight: "@typography.weights.semibold"
  subheader:
    color: "@colors.cyan"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  body:
    color: "@colors.gray-medium"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.normal"
  body_strong:
    ref: "@text.body"
    font:
      weight: "@typography.weights.semibold"
  numeric:
    color: "@colors.secondary"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  links:
    color: "@colors.gray-light"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.semibold"
  metadata:
    color: "@colors.gray-medium"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.normal"
  description:
    color: "@colors.gray-medium"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.normal"
  label:
    color: "@colors.gray-text"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: "@typography.weights.semibold"
  button:
    color:
      default: "@colors.gray-light"
      hover: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  nav:
    color:
      default: "@colors.gray-medium"
      hover: "@colors.primary"
      active: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.bold"
  dropdown:
    color: "@colors.secondary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.semibold"
  status:
    color: "@colors.primary"
    formatting: "uppercase"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: "@typography.weights.bold"
  icon:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.icon"
      size: "@typography.scale.md"
      weight: "@typography.weights.normal"
  icon_lg:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.icon"
      size: "@typography.scale.lg"
      weight: "@typography.weights.normal"

# ─────────────────────────────────────────────────────────────────
# 6. GLYPHS (Symbol Aliases)
# ─────────────────────────────────────────────────────────────────
glyphs:
  # App Actions
  render-action: "\U000F0A1C"
  exit-action:   "\U000F0206"
  settings:      "\U000F0493"
  save:          "\U000F012C"
  folder:        "\U000F024B"
  close:         "\U000F0156"
  stop:          "\U000F04DB"
  trash:         "\U000F0A7A"
  info:          "\U000F02FD"
  alert:         "\U000F0CF0"
  plus:          "\U000F0130"
  
  # Controls
  cw:            "\U000F0453"
  ccw:           "\U000F0459"
  sun:           "\U000F0599"
  moon:          "\U000F0594"
  computer:      "\U000F0379"
  bolt:          "\U000F033F"
  cloud:         "\U000F02F9"
  edit:          "\U000F0052"
  
  # Status
  status-ok:     "\U000F05E0"
  status-error:  "\U000F0156"
  alert-octagram: "\U000F0767"
  
  # Axis
  axis-x:        "\U000F0D4C"
  axis-y:        "\U000F0D51"
  axis-y-rot:    "\U000F0D54"
  axis-z-rot:    "\U000F0D58"
  
  # Presets
  preset-hero:   "\U000F0465"
  preset-spin:   "\U000F1999"
  preset-flip:   "\U000F0D98"
  preset-custom: "\U000F166B"
  
  # Navigation
  chevron-down:  "\U000F0140"
  chevron-up:    "\U000F0143"

# ─────────────────────────────────────────────────────────────────
# 7. VIEWPORT
# ─────────────────────────────────────────────────────────────────
viewport:
  bg: "@colors.gray-black"
  grid: "@colors.gray-medium"
  wireframe: null
  axes:
    x: "@colors.red"
    y: "@colors.green"
    z: "@colors.cyan"

# ─────────────────────────────────────────────────────────────────
# 8. LAYOUT (Application Layout Definitions)
# ─────────────────────────────────────────────────────────────────
layout:
  # Main application layout (left panel, right panel, header, etc.)
  main:
    frame:
      bg: "@colors.gray-black"
      radius: "@radius.none"
    header:
      bg: "@colors.gray-black"
      logo: "@colors.primary"
      title: "@text.title"
      subtitle: "@text.subtitle"
    leftpanel:
      bg: "@colors.gray-black"
      width: 450
      headers: "@text.header"
      subheaders: "@text.subheader"
      body: "@text.body"
      descriptions: "@text.description"
      border: "@borders.default"
      scrollbar: "@components.scrollbar"
      padding: 16
    divider:
      bg: "@dividers.default.color"
      size: 1
    rightpanel:
      bg: "@colors.black"
      shader: "@text.nav"
      title: "@text.title"
      info: "@text.metadata"
    status: "@components.status"

  # Modal dialog layouts
  dialogs:
    default:
      frame:
        width: 600
        height: 500
        bg: "@colors.gray-dark"
        border: "@borders.default"
        radius: "@radius.md"
        shadow:
          size: 16
          color: "@colors.black"
      header:
        bg: "@colors.gray-black"
        border: "@borders.default"
        height: 48
        title: "@text.header"
      body:
        bg: "@colors.gray-dark"
        padding:
          all: "@typography.spacing.lg"
        text: "@text.body"
        description: "@text.description"
        section_label: "@text.subheader"
      controls:
        bg: "@colors.gray-dark"
        border: None
        gap: "@typography.spacing.base"
        button1:
          ref: "@components.button.ok"
        button2:
          ref: "@components.button.cancel"
    filename:
      ref: "@layout.dialogs.default"
      frame:
        width: 300
        height: 220
      controls:
        padding: 16
        gap: 8
        button1:
          ref: "@components.button.cancel"
          width: "50%"
        button2:
          ref: "@components.button.save"
          width: "50%"
    options:
      ref: "@layout.dialogs.default"
      frame:
        width: 600
        height: 640
      body:
        links: "@text.links"
    presets:
      ref: "@layout.dialogs.default"
      frame:
        width: 300
        height: 250
      controls: None
    addpreset:
      ref: "@layout.dialogs.default"
      frame: 
        width: 300
        height: 180
      controls:
        button1:
          ref: "@components.button.save"
          width: "50%"
        button2:
          ref: "@components.button.cancel"
          width: "50%"

# ─────────────────────────────────────────────────────────────────
# 9. COMPONENT DEFINITIONS (Atomic UI Components)
# ─────────────────────────────────────────────────────────────────x
components:
  section_label:
    label:
      ref: "@text.header"

  badge:
    frame:
      height: 18
      bg: "@colors.cyan"
      radius: "@radius.sm"
      padding:
        horizontal: "@typography.spacing.sm"
    icon: 
      ref: "@text.icon"
    label:
      font:
        typeface: "@typography.families.mono"
        size: "@typography.scale.base"
        weight: "@typography.weights.bold"
      color: "@colors.black"
    gap: "@typography.spacing.sm"

  preset_card:
    default:
      frame:
        width: 90
        height: 64
        bg:
          default: "@colors.transparent"
          hover: "@colors.cyan-20"
          active: "@colors.primary"
        border: 
          size: "@borders.subtle.size"
          color: 
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
            active: "@colors.transparent"
        radius: "@radius.lg"
        padding:
          vertical: "@typography.spacing.sm"
        cursor: "hand"
      gap: 8
      icon:
        ref: "@text.icon_lg"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
          active: "@colors.gray-dark"
      label:
        ref: "@text.body"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
          active: "@colors.gray-dark"
    card1: "@components.preset_card.default"
    card2: "@components.preset_card.default"
    card3: "@components.preset_card.default"
    card4: "@components.preset_card.default"

  input:
    default:
      type: "text" # type can be text, numeric, or rich (for file paths with browse button)
      editable: true # readonly bool
      case: "none" # for text inputs, can be none, upper, or lower
      icon_style:
        ref: "@text.icon"
      label: # unit suffix label (e.g. "°", "f")
        ref: "@text.numeric"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
      frame: 
        height: 32 # height of field
        bg: # bg of field
          default: "@colors.gray-black"
          hover: "@colors.cyan-20"
        radius: "@radius.md" # border radius of field
        border: # border of field
          size: 1 # border size
          color: # border color
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
            active: "@colors.primary"
      color: # text color
        default: "@colors.gray-light"
        hover: "@colors.primary"
        active:  "@colors.primary"
      font: "@text.numeric.font" # font
      selection: "@colors.cyan-20" # highlight selection color
      alignment: "center" # text alignment
      placeholder:
        color: "@colors.gray-medium"
      error:
        color: "@colors.error"
        border:
          size: "@borders.width.medium"
          color: "@colors.error"
    path:
      ref: "@components.input.default"
      type: "rich"
      alignment: "left"
      icon:
        ref: "glyphs.folder"
        color: "@colors.primary"
      frame:
        height: 36
        bg:
          default: "@colors.transparent"
          hover: "@colors.cyan-20"
      color: 
        default: "@colors.gray-white"
        hover: "@colors.primary"
        active: "@colors.primary"
    axis:
      ref: "@components.input.default"
      type: "numeric"
      alignment: "right"
      unit: "°"
      step: 0.1
      frame:
        height: 32
    speed:
      ref: "@components.input.default"
      type: "numeric"
      alignment: "right" 
      unit: "f"
      step: 0.1
      frame:
        height: 32
    parameters:
      ref: "@components.input.default"
      type: "text"
      alignment: "left"
      multiline: true
      frame:
        height: 84
        bg:
          default: "@colors.gray-black"
          hover: "@colors.cyan-20"
    hex:
      ref: "@components.input.default"
      case: "upper"
      alignment: "center"
      prefix: "#"
      frame:
        height: 32

  slider:
    default:
      frame:
        height: 18
      icon: 
        ref: "@text.icon"
      label: 
        ref: "@text.label"
      track:
        frame:
          height: 8
          radius: "@radius.sm"
        color: 
          default: "@colors.gray-border"
          hover: "@colors.cyan-20"
        border: "@borders.width.none"
      nub:
        width: 1
        height: 14
        border: "@borders.width.none"
        color: "@colors.primary"
      input: "@components.input.axis"
    primary:
      ref: "@components.slider.default"
      nub: { color: "@colors.yellow" }
    secondary:
      ref: "@components.slider.default"
      nub: { color: "@colors.orange" }
    tertiary:
      ref: "@components.slider.default"
      nub: { color: "@colors.purple" }
    quaternary:
      ref: "@components.slider.default"
      nub: { color: "@colors.pink" }

  toggle:
    default:
      frame:
        height: 32
        radius: "@radius.md"
        bg: 
          default: "@colors.transparent"
          hover: "@colors.cyan-10"
        border:
          size: "@borders.subtle.size"
          color: 
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
      gap: "@typography.spacing.sm"
      items: # individual toggle items
        frame:
          bg: 
            default: "@colors.transparent"
            hover: "@colors.transparent"
            active: "@colors.primary"
        icon: 
          ref: "@text.icon"
          color: 
            default: "@colors.gray-light"
            hover: "@colors.primary"
            active: "@colors.gray-dark" #selected
        label: 
          ref: "@text.label"
          color: 
            default: "@colors.gray-light"
            hover: "@colors.primary"
            active: "@colors.gray-black" # selected
    direction:
      ref: "@components.toggle.default"
    lighting:
      ref: "@components.toggle.default"
      items:
        frame:
          bg:
            default: "@colors.transparent"
            hover: "@colors.transparent"
            active: "@colors.yellow"
        label:
          color:
            default: "@colors.gray-light"
            hover: "@colors.cyan"
            active: "@colors.gray-dark"
        icon:
          color:
            default: "@colors.gray-light"
            hover: "@colors.cyan"
            active: "@colors.gray-dark"
    logging: "@components.toggle.default"

  dropdown:
    default: # default styles for all dropdowns, individual dropdowns can override specific properties
      frame:
        height: 32 # main module height
        bg: 
          default: "@colors.transparent" # main module bg
          hover: "@colors.cyan-20"
        radius: "@radius.md" # main module radius
        border: 
          size: "@borders.width.thin"
          color: 
            default: "@colors.gray-border"
            hover: "@colors.transparent" 
            active: "@colors.transparent" # main module while dropdown is open
      label: # main module text font and color
        ref: "@text.dropdown"
        color:
          default: "@colors.gray-light"
          hover: "@colors.primary"
      icon: # main module chevron color
        ref: "@text.icon"
        color: 
          default: "@colors.gray-light"
          hover: "@colors.primary"
      menu: # popout menu container
        frame:
          bg: "@colors.gray-dark" # menu container bg
          radius: "@radius.md" # menu container radius
          border: "@borders.subtle" # menu container border
        items: # menu item styles
          bg:
            default: "@colors.transparent" # menu item bg
            hover: "@colors.cyan-20"
            active: "@colors.primary" # selected state  
          radius: "@radius.md" # menu items have no border
          border: "@borders.none"
          label:
            ref: "@text.dropdown"
            color:
              default: "@colors.gray-white"
              hover: "@colors.primary"
              active: "@colors.gray-dark" # selected item text color
    format: "@components.dropdown.default" # specific dropdown for output format selection
    resolution: "@components.dropdown.default" # specific dropdown for output resolution selection

  colorpicker:
    default:
      bg: "@colors.transparent"
      border: "@borders.subtle"
      radius: "@radius.sm"
      label:
        font:
          typeface: "@typography.families.mono"
          size: "@typography.scale.sm"
          weight: "@typography.weights.semibold"
        color: 
          default: "@colors.gray-light"
          hover: "@colors.primary"
          active: "@colors.primary"
      items:
        innerborder:
          size: 1
          color:
            default: "@colors.gray-black"
            hover: "@colors.primary"
            active: "@colors.gray-black"
        border:
          size: 2
          color:
            default: "@borders.subtle.color"
            hover: "@colors.red"
            active: "@colors.primary"
      input: "@components.input.default"

  button:
    default:
      frame:
        height: 36
        bg: 
          default: "@colors.transparent"
          hover: "@colors.cyan-20"
        border: 
          size: "@borders.subtle.size"
          color:
            default: "@borders.subtle.color"
            hover: "@colors.transparent"
        radius: "@radius.md"
        padding:
          horizontal: "@typography.spacing.base"
        content_alignment: "center"
        cursor: "hand"
      icon: 
        ref: "@text.icon"
      label: 
        ref: "@text.button"
      gap: "@typography.spacing.base"
    cancel:
      ref: "@components.button.default"
    ok:
      ref: "@components.button.default"
      frame:
        bg: "@colors.primary"
      label:
        ref: "@text.button"
        color: "@colors.gray-black"
    close:
      ref: "@components.button.default"
      frame:
        bg:
          default: "@colors.transparent"
          hover: "@colors.red"
          active: "@colors.red"
        border:
          size: 1
          color: "@colors.transparent"
      label:
        color:
          default: "@colors.gray-light"
          hover: "@colors.gray-white"
          active: "@colors.gray-white"
    closepreview:
      ref: "@components.button.default"
      label:
        font: "@text.metadata.font"
        color: "@colors.cyan"
    options:
      ref: "@components.button.default"
      frame:
        padding:
          horizontal: 0
        bg:
          default: "@colors.transparent"
          hover: "@colors.primary"
      label:
        color:
          default: "@colors.gray-light"
          hover: "@colors.gray-dark"
    browse:
      ref: "@components.button.default"
    exit:
      ref: "@components.button.default"
      frame:
        bg: "@colors.error"
        hover: "@colors.red"
      label:
        ref: "@text.button"
        color: "@colors.white"
    render:
      ref: "@components.button.ok"
    save:
      ref: "@components.button.ok"

  scrollbar:
    track:
      frame:
        bg: "@colors.transparent"
    thumb:
      frame:
        bg: "@colors.gray-medium"
        radius: "@radius.full"

  status:
    default:
      bg: "@colors.gray-black"
      label:
        ref: "@text.status"
        color: "@colors.gray-white"
    progress:
      bg: "@colors.primary"
      label:
        ref: "@text.status"
        color: "@colors.gray-black"
    complete:
      bg: "@colors.gray-black"
      label:
        ref: "@text.status"
        color: "@colors.ok"
    error:
      bg: "@colors.gray-black"
      label:
        ref: "@text.status"
        color: "@colors.error"

  list:
    default:
      frame:
        height: 40
        bg:
          default: "@colors.transparent"
          hover: "@colors.cyan-20"
        radius: "@radius.sm"
        border:
          size: 1
          color:
            default: "@colors.gray-border"
            hover: "@colors.transparent"
            active: "@colors.primary"
        cursor: "hand"
      icon:
        ref: "@text.icon"
        color:
          default: "@colors.gray-white"
          hover: "@colors.primary"
      label:
        ref: "@text.body"
        color:
          default: "@colors.gray-white"
          hover: "@colors.primary"
      border:
        size: "@borders.subtle.size"
        color:
          default: "@borders.subtle.color"
          hover: "@colors.transparent"
          active: "@colors.transparent"
      actions:
        delete:  { icon: { ref: "glyphs.trash" }, color: "@colors.warning" }
        confirm: { icon: { ref: "glyphs.save" },  color: "@colors.ok"      }
        cancel:  { icon: { ref: "glyphs.close" }, color: "@colors.warning" }
    custompresets:
      ref: "@components.list.default"
