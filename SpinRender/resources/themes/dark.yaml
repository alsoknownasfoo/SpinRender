# SpinRender Theme V2 — Dark (Default)
# Note: STYLING ONLY. All text/icon content is in locale_en.yaml.

# ─────────────────────────────────────────────────────────────────
# 1. COLORS (Global Design Tokens & Semantic Roles)
# ─────────────────────────────────────────────────────────────────
colors:
  # Base Palette (Primes)
  gray-black:  "#0D0D0D"
  gray-dark:   "#121212"
  gray-border: "#1F1F1F"
  gray-medium: "#323232"
  gray-light:  "#646464"
  gray-text:   "#777777"
  gray-white:  "#E0E0E0"
  white:       "#FFFFFF"
  white-68:    "rgba(255,255,255,0.68)"
  black:       "#000000"
  transparent: "rgba(0,0,0,0)"

  cyan:        "#00BCD4"
  yellow:      "#FFD600"
  green:       "#4CAF50"
  orange:      "#FF6B35"
  red:         "#FF3B30"
  purple:      "#AA6BFF"
  pink:        "#F240FF"

  # Semantic Roles (Theme)
  primary:     "@colors.cyan"
  secondary:   "@colors.yellow"
  tertiary:    "@colors.purple"
  quaternary:  "@colors.pink"
  ok:          "@colors.green"
  warning:     "@colors.orange"
  error:       "@colors.red"

# ─────────────────────────────────────────────────────────────────
# 2. RADIUS (Rounding Scale)
# ─────────────────────────────────────────────────────────────────
radius:
  none: 0
  sm:   4
  md:   6
  lg:   8
  full: 9999

# ─────────────────────────────────────────────────────────────────
# 3. BORDERS (Width Scales & Roles)
# ─────────────────────────────────────────────────────────────────
borders:
  width:
    none:   0
    thin:   1
    medium: 2

  # Semantic Roles
  default:
    size: "@borders.width.thin"
    color: "@colors.gray-border"
  subtle:
    size: "@borders.width.thin"
    color: "@colors.gray-border"
  focus:
    size: "@borders.width.thin"
    color: "@colors.primary"
  strong:
    size: "@borders.width.medium"
    color: "@colors.primary"

# ─────────────────────────────────────────────────────────────────
# 4. TYPOGRAPHY (Scales & Roles)
# ─────────────────────────────────────────────────────────────────
typography:
  families:
    mono:    "JetBrains Mono"
    display: "Oswald"
    icon:    "Material Design Icons"

  weights:
    hairline: 100
    thin:     200
    light:    300
    normal:   400
    medium:   500
    semibold: 600
    bold:     700
    extrabold: 800
    black:    900

  scale:
    xs: 7
    sm: 9
    base: 11
    md: 14
    lg: 18
    xl: 24
    icon: 16
    icon-lg: 20

  spacing:
    none: 0
    sm:   6
    base: 10
    md:   16
    lg:   24

# ─────────────────────────────────────────────────────────────────
# 5. TEXT STYLES (Global Roles)
# ─────────────────────────────────────────────────────────────────
text:
  title:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.display"
      size: "@typography.scale.lg"
      weight: 700
  subtitle:
    color: "@colors.primary"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 700
  header:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.display"
      size: "@typography.scale.md"
      weight: 600
  subheader:
    color: "@colors.gray-text"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 600
  body:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: 400
  links:
    color: "@colors.primary"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: 600
  metadata:
    color: "@colors.white-68"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 400
  metadata_active:
    color: "@colors.ok"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 600
  label:
    color: "@colors.gray-text"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 600
  button:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.base"
      weight: 600
  nav:
    color: "@colors.gray-medium"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 700
  nav_active:
    color: "@colors.primary"
    font:
      typeface: "@typography.families.mono"
      size: "@typography.scale.sm"
      weight: 700
  icon:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.icon"
      size: "@typography.scale.md"
  icon_lg:
    color: "@colors.gray-white"
    font:
      typeface: "@typography.families.icon"
      size: "@typography.scale.lg"

# ─────────────────────────────────────────────────────────────────
# 6. GLYPHS (Symbol Aliases)
# ─────────────────────────────────────────────────────────────────
glyphs:
  # App Actions
  render-action: "\U000F0A1C"
  exit-action:   "\U000F0206"
  settings:      "\U000F0493"
  save:          "\U000F012C"
  folder:        "\U000F024B"
  close:         "\U000F0156"
  stop:          "\U000F04DB"
  trash:         "\U000F0A7A"
  info:          "\U000F02FD"
  alert:         "\U000F0CF0"
  
  # Controls
  cw:            "\U000F0453"
  ccw:           "\U000F0459"
  sun:           "\U000F0599"
  bolt:          "\U000F033F"
  cloud:         "\U000F02F9"
  edit:          "\U000F0052"
  
  # Status
  status-ok:     "\U000F05E0"
  status-error:  "\U000F0156"
  
  # Axis
  axis-x:        "\U000F0D4C"
  axis-y:        "\U000F0D51"
  axis-y-rot:    "\U000F0D54"
  axis-z-rot:    "\U000F0D58"
  
  # Presets
  preset-hero:   "\U000F0465"
  preset-spin:   "\U000F1999"
  preset-flip:   "\U000F0D98"
  preset-custom: "\U000F166B"
  
  # Navigation
  chevron-down:  "\U000F0140"
  chevron-up:    "\U000F0143"

# ─────────────────────────────────────────────────────────────────
# 7. VIEWPORT
# ─────────────────────────────────────────────────────────────────
viewport:
  bg: "@colors.gray-black"
  grid: "@colors.gray-medium"
  wireframe: null
  axes:
    x: "@colors.red"
    y: "@colors.green"
    z: "@colors.cyan"

# ─────────────────────────────────────────────────────────────────
# 8. COMPONENT DEFINITIONS
# ─────────────────────────────────────────────────────────────────
components:
  main:
    frame:
      bg: "@colors.gray-dark"
      radius: "@radius.none"
    header:
      bg: "@colors.gray-black"
      logo: "@colors.primary"
      title: "@text.title"
      subtitle: "@text.subtitle"
    leftpanel:
      bg: "@colors.gray-dark"
      width: 450
      headers: "@text.header"
      subheaders: "@text.subheader"
      body: "@text.body"
      border: "@borders.default"
      scrollbar: "@components.scrollbar"
    divider:
      bg: "@colors.gray-border"
      size: 1
    rightpanel:
      bg: "@colors.gray-black"
      nav: "@text.nav"
      nav_active: "@text.nav_active"
      title: "@text.title"
      info: "@text.metadata"
      info_active: "@text.metadata_active"
    status: "@components.status"

  badge:
    frame:
      height: 18
      bg: "@colors.warning"
      radius: "@radius.sm"
      padding:
        horizontal: "@typography.spacing.sm"
    icon: "@text.icon"
    label:
      font: "@typography.scale.sm"
      color: "@colors.gray-dark"
    gap: "@typography.spacing.sm"

  preset_card:
    default:
      frame:
        width: 90
        height: 64
        radius: "@radius.lg"
        padding:
          vertical: "@typography.spacing.sm"
        cursor: "hand"
      gap: 8
      default:
        bg: "@colors.gray-dark"
        border: "@borders.subtle"
        icon: "@text.icon_lg"
        label: "@text.label"
      selected:
        bg: "@colors.gray-medium"
        border: "@borders.focus"
        icon:
          ref: "@text.icon_lg"
          color: "@colors.primary"
        label:
          ref: "@text.label"
          color: "@colors.primary"
    card1: "@components.preset_card.default"
    card2: "@components.preset_card.default"
    card3: "@components.preset_card.default"
    card4: "@components.preset_card.default"

  input:
    default:
      frame:
        height: 32
        bg: "@colors.gray-black"
        radius: "@radius.md"
        border: "@borders.subtle"
      color:
        default: "@colors.gray-white"
        active:  "@colors.primary"
        disabled: "@colors.gray-text"
      border: "@borders.subtle"
      selection: "rgba(0, 188, 212, 0.3)"
      font: "@text.body.font"
      error:
        color: "@colors.error"
        border:
          size: "@borders.width.medium"
          color: "@colors.error"
    path:
      ref: "@components.input.default"
      frame:
        height: 36
    parameters:
      ref: "@components.input.default"
      frame:
        height: 28

  slider:
    default:
      frame:
        height: 18
      icon: "@text.icon"
      label: "@text.label"
      track:
        frame:
          height: 4
          radius: "@radius.sm"
        color: "@colors.gray-border"
        border: "@borders.width.none"
      nub:
        width: 7
        height: 18
        border: "@borders.width.none"
        color: "@colors.primary"
      input: "@components.input.parameters"
    primary: "@components.slider.default"
    secondary: "@components.slider.default"
    tertiary: "@components.slider.default"
    quaternary: "@components.slider.default"

  toggle:
    default:
      frame:
        height: 32
        radius: "@radius.md"
        border: "@borders.subtle"
      gap: "@typography.spacing.sm"
      default:
        frame:
          bg: "@colors.gray-black"
        icon: "@text.icon"
        label: "@text.label"
      selected:
        frame:
          bg: "@colors.primary"
        icon:
          ref: "@text.icon"
          color: "@colors.gray-black"
        label:
          ref: "@text.label"
          color: "@colors.gray-black"
    direction: "@components.toggle.default"
    lighting: "@components.toggle.default"
    logging: "@components.toggle.default"

  dropdown:
    default:
      frame:
        height: 32
        bg: "@colors.gray-black"
        radius: "@radius.md"
        border: "@borders.subtle"
      icon: "@text.icon"
      open:
        border: "@borders.focus"
        icon:
          ref: "@text.icon"
          color: "@colors.primary"
      menu:
        frame:
          bg: "@colors.gray-dark"
          radius: "@radius.sm"
          border: "@borders.subtle"
        default:
          label: "@text.body"
        selected:
          bg: "@colors.primary"
          label:
            ref: "@text.body"
            font:
              weight: 600
            color: "@colors.gray-black"
    format: "@components.dropdown.default"
    resolution: "@components.dropdown.default"

  colorpicker:
    default:
      bg: "@colors.gray-dark"
      border: "@borders.subtle"
      radius: "@radius.sm"
      default:
        border: "@borders.subtle"
      selected:
        border: "@borders.strong"
      input: "@components.input.parameters"

  button:
    default:
      frame:
        height: 36
        radius: "@radius.md"
        padding:
          horizontal: "@typography.spacing.base"
        content_alignment: "center"
        cursor: "hand"
      icon: "@text.icon"
      label: "@text.button"
      gap: "@typography.spacing.base"
    cancel:
      ref: "@components.button.default"
      frame:
        bg: "@colors.gray-black"
        border: "@borders.subtle"
    ok:
      ref: "@components.button.default"
      frame:
        bg: "@colors.primary"
      label:
        ref: "@text.button"
        color: "@colors.gray-black"
    close:
      ref: "@components.button.default"
      frame:
        bg: "@colors.transparent"
        hover: "rgba(255,255,255,0.08)"
    options:
      ref: "@components.button.default"
      frame:
        padding:
          horizontal: 0
    browse:
      ref: "@components.button.default"
      frame:
        bg: "@colors.gray-black"
        border: "@borders.subtle"
    exit:
      ref: "@components.button.default"
      frame:
        bg: "@colors.error"
        hover: "@colors.red"
      label:
        ref: "@text.button"
        color: "@colors.white"
    render:
      ref: "@components.button.ok"

  scrollbar:
    track:
      frame:
        bg: "@colors.transparent"
    thumb:
      frame:
        bg: "@colors.gray-medium"
        radius: "@radius.full"

  status:
    default:
      bg: "@colors.gray-black"
      label:
        ref: "@text.subheader"
        color: "@colors.ok"
    progress:
      bg: "@colors.primary"
      label:
        ref: "@text.subheader"
        color: "@colors.gray-black"
    complete:
      bg: "@colors.gray-black"
      label:
        ref: "@text.subheader"
        color: "@colors.ok"
    error:
      bg: "@colors.gray-black"
      label:
        ref: "@text.subheader"
        color: "@colors.error"
