[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --cov=SpinRender
    --cov-report=term-missing
    --cov-report=html
    # Temporarily disable overall fail-under during TDD of individual modules
    # We'll enforce per-module coverage manually in test files
    --cov-fail-under=0
    --tb=short
